                {currentFilter === 'custom' && (<div className="grid grid-cols-2 gap-2 bg-white p-3 rounded-2xl border border-slate-200 shadow-sm animate-in slide-in-from-top duration-300"><div><label className="text-[8px] font-black text-slate-400 uppercase ml-1">From</label><input type="date" value={customStart || ""} onChange={(e) => setCustomStart(e.target.value)} className="w-full bg-slate-50 border border-slate-100 p-2 rounded-xl text-xs font-bold text-slate-700 outline-none" /></div><div><label className="text-[8px] font-black text-slate-400 uppercase ml-1">To</label><input type="date" value={customEnd || ""} onChange={(e) => setCustomEnd(e.target.value)} className="w-full bg-slate-50 border border-slate-100 p-2 rounded-xl text-xs font-bold text-slate-700 outline-none" /></div></div>)}

                    <div className="space-y-4">
                        <h3 className="text-[10px] font-black uppercase text-slate-400 ml-1 tracking-[0.15em]">Financial Summary {isRomanUrduEnabled && "(Maali Hisaab)"}</h3>

                        <div className="grid grid-cols-2 gap-3 -mt-2 mb-2">
                            <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm flex flex-col">
                                <div className="p-3 bg-gradient-to-r from-blue-600 to-blue-700 text-white text-center border-b border-blue-800">
                                    <p className="text-[8px] font-black uppercase tracking-widest opacity-80 mb-0.5">Total Sale</p>
                                    <p className="text-sm font-black truncate">{statsGroups.totals.totalSale}</p>
                                </div>
                                <div className="flex-1 grid grid-cols-2 divide-x divide-slate-100">
                                    <div className="p-2 text-center bg-green-50/30">
                                        <p className="text-[7px] font-black text-green-600 uppercase tracking-widest">Cash</p>
                                        <p className="text-[10px] font-bold text-slate-800 truncate">{statsGroups.financials[0].value.replace('Rs. ', '')}</p>
                                    </div>
                                    <div className="p-2 text-center bg-amber-50/30">
                                        <p className="text-[7px] font-black text-amber-600 uppercase tracking-widest">Udhaar</p>
                                        <p className="text-[10px] font-bold text-slate-800 truncate">{statsGroups.financials[1].value.replace('Rs. ', '')}</p>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm flex flex-col">
                                <div className="p-3 bg-gradient-to-r from-indigo-600 to-indigo-700 text-white text-center border-b border-indigo-800">
                                    <p className="text-[8px] font-black uppercase tracking-widest opacity-80 mb-0.5">Total Purchase</p>
                                    <p className="text-sm font-black truncate">{statsGroups.totals.totalPurchase}</p>
                                </div>
                                <div className="flex-1 grid grid-cols-2 divide-x divide-slate-100">
                                    <div className="p-2 text-center bg-blue-50/30">
                                        <p className="text-[7px] font-black text-blue-600 uppercase tracking-widest">Cash</p>
                                        <p className="text-[10px] font-bold text-slate-800 truncate">{statsGroups.financials[2].value.replace('Rs. ', '')}</p>
                                    </div>
                                    <div className="p-2 text-center bg-slate-50/30">
                                        <p className="text-[7px] font-black text-slate-600 uppercase tracking-widest">Udhaar</p>
                                        <p className="text-[10px] font-bold text-slate-800 truncate">{statsGroups.financials[3].value.replace('Rs. ', '')}</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="grid grid-cols-2 gap-3">
                            {statsGroups.financials.slice(4, 8).map((stat, i) => (
                                <div key={i} className={`${stat.bg} p-4 rounded-2xl border border-white/50 shadow-sm text-left transition-all`}>
                                    <p className={`text-[9px] font-bold uppercase ${stat.labelColor || 'text-slate-500'}`}>{stat.label}</p>
                                    <div className="flex items-baseline gap-1.5">
                                        <p className="text-base font-bold text-slate-800">{stat.value}</p>
                                        {stat.subNote && <span className="text-[7px] font-black text-slate-400 uppercase tracking-tighter italic">{stat.subNote}</span>}
                                    </div>
                                    {isRomanUrduEnabled && <p className={`text-[8px] font-bold uppercase mt-1 tracking-tighter opacity-70 ${stat.labelColor || 'text-slate-500'}`}>{stat.romanUrdu}</p>}
                                </div>
                            ))}

                            <div className="col-span-2 flex gap-3">
                                {statsGroups.financials.slice(8, 9).map((stat, i) => (
                                    <div key={i} className={`${stat.bg} p-4 rounded-2xl border border-white/50 shadow-sm text-left transition-all flex-1`}>
                                        <p className={`text-[9px] font-bold uppercase ${stat.labelColor || 'text-slate-500'}`}>{stat.label}</p>
                                        <p className="text-base font-bold text-slate-800">{stat.value}</p>
                                        {isRomanUrduEnabled && <p className={`text-[8px] font-bold uppercase mt-1 tracking-tighter opacity-70 ${stat.labelColor || 'text-slate-500'}`}>{stat.romanUrdu}</p>}
                                    </div>
                                ))}
                                <button onClick={onAddExpense} className="w-1/3 bg-red-50 p-4 rounded-2xl border-b-4 border-red-200 flex flex-col items-center justify-center text-red-600 active:scale-95 transition-all shadow-md">
                                    <Icon name="PlusCircle" size={20} className="mb-1" />
                                    <p className="text-[10px] font-black uppercase leading-tight text-center">Add<br />Expense</p>
                                </button>
                            </div>
                        </div>

                        <h3 className="text-[10px] font-black uppercase text-slate-400 ml-1 tracking-[0.15em] pt-2">Ledger Totals {isRomanUrduEnabled && "(Khata Summary)"}</h3>
                        <div className="grid grid-cols-2 gap-3">
                            {statsGroups.ledgers.map((stat, i) => (
                                <button key={i} onClick={() => onStatClick(stat.target, stat.filter)} className={`${stat.bg} p-4 rounded-2xl border border-white/50 shadow-sm text-left active:scale-95 transition-all`}>
                                    <p className={`text-[9px] font-bold uppercase ${stat.labelColor || 'text-slate-500'}`}>{stat.label}</p>
                                    <p className="text-base font-bold text-slate-800">{stat.value}</p>
                                    {isRomanUrduEnabled && <p className={`text-[8px] font-black uppercase mt-1 tracking-wider ${stat.labelColor}`}>{stat.urduLabel}</p>}
                                </button>
                            ))}
                        </div>

                        <h3 className="text-[10px] font-black uppercase text-slate-400 ml-1 tracking-[0.15em] pt-2">Inventory & Expiry {isRomanUrduEnabled && "(Maal ki Tafseel)"}</h3>
                        <div className="grid grid-cols-2 gap-3">
                            {statsGroups.inventory.map((stat, i) => (
                                <button key={i} onClick={() => onStatClick(stat.target, stat.filter)} className={`${stat.bg} p-4 rounded-2xl border border-white/50 shadow-sm text-left active:scale-95 transition-all`}>
                                    <p className={`text-[9px] font-bold uppercase ${stat.labelColor || 'text-slate-500'}`}>{stat.label}</p>
                                    <p className="text-base font-bold text-slate-800">{stat.value}</p>
                                    {isRomanUrduEnabled && <p className="text-[8px] font-bold text-slate-400 uppercase mt-1">{stat.romanUrdu}</p>}
                                </button>
                            ))}
                        </div>

                        <h3 className="text-[10px] font-black uppercase text-slate-400 ml-1 tracking-[0.15em] pt-2">Stock Valuation {isRomanUrduEnabled && "(Maal ki Qeemat)"}</h3>
                        <div className="grid grid-cols-2 gap-3">
                            {statsGroups.valuation.map((stat, i) => (
                                <div key={i} className={`${stat.bg} p-4 rounded-2xl border border-white/50 shadow-sm text-left transition-all`}>
                                    <p className={`text-[9px] font-bold uppercase ${stat.labelColor || 'text-slate-500'}`}>{stat.label}</p>
                                    <p className="text-base font-bold text-slate-800">{stat.value}</p>
                                    {isRomanUrduEnabled && <p className={`text-[8px] font-bold uppercase mt-1 opacity-70 ${stat.labelColor || 'text-slate-500'}`}>{stat.romanUrdu}</p>}
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="space-y-3 pb-8">
                        <h3 className="text-[11px] font-black uppercase text-slate-400 ml-1 tracking-[0.2em]">Recent Activity</h3>
                        
                        <div className="bg-white p-3 rounded-2xl border border-slate-100 shadow-sm space-y-2">
                            <div className="relative">
                                <Icon name="Search" size={16} className="absolute left-3 top-2.5 text-slate-400" />
                                <input 
                                    type="text" 
                                    value={activitySearch}
                                    onChange={(e) => setActivitySearch(e.target.value)}
                                    placeholder="Search name, details or Bill#..." 
                                    className="w-full bg-slate-50 border border-slate-200 py-2 pl-9 pr-3 rounded-xl outline-none text-xs font-semibold focus:border-blue-400 transition-all"
                                />
                            </div>
                            <div className="flex gap-2">
                                <select 
                                    value={activityDateFilter}

px] font-black text-blue-600">Rs. {paid}</p></div><div className="text-center"><p className="text-[8px] font-bold text-slate-400 uppercase">Baqaya</p><p className={`text-[11px] font-black ${remaining > 0 ? 'text-red-500' : 'text-green-500'}`}>Rs. {remaining}</p></div></div>) : (<div className="flex justify-between items-center px-2 py-1 bg-slate-50/30 rounded-lg"><p className="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Amount</p><p className={`font-black text-sm ${(t.type === 'sale' || t.type === 'receipt') ? 'text-green-600' : 'text-red-600'}`}>Rs. {total}</p></div>)}{t.description && (<p className="text-[10px] text-slate-500 font-bold mt-2 italic flex items-center gap-1"><Icon name="Notebook" size={10} /> {t.description}</p>)}</div>); }))}

        const LedgersSection = ({ contactsList, setIsAddContactModalOpen, setSelectedLedger, contactListTab, setContactListTab, onToggleInactive }) => {

            useEffect(() => {

            const filteredContacts = useMemo(() => contactsList.filter(c => c.type === contactListTab && (isViewingInactive ? c.isInactive : !c.isInactive) && ((c.name || "").toLowerCase().includes((searchTerm || "").toLowerCase()) || (c.phone && c.phone.includes(searchTerm)))), [contactsList, contactListTab, searchTerm, isViewingInactive]);

                const pPrice = parseFloat(purchasePrice) || 0;
                const sPrice = parseFloat(salePrice) || 0;
                const wPrice = parseFloat(wholesalePrice) || 0;

                if (sPrice < pPrice) {
                    setStockError("Sale Price kam hai! (Sale Price cannot be less than Purchase Price)");
                    return;
                }
                if (wPrice > 0 && wPrice < pPrice) {

                const pData = {

                        <div className="flex justify-between items-center border-b border-slate-50 pb-2"><h3 className="font-bold text-slate-800 text-lg">{editingProduct ? 'Edit Product' : 'Add New Product'}</h3><button onClick={() => { setIsAddModalOpen(false); resetProductForm(); }} className="p-2 bg-slate-50 rounded-full active:scale-90"><Icon name="X" /></button></div>

                            <div>
                                <label className="text-[10px] font-black text-red-500 uppercase tracking-widest">Name*</label>
                                <input value={itemName || ""} onChange={(e) => { setItemName(e.target.value); setErrors({ ...errors, itemName: false }); }} className={`w-full p-3 bg-slate-50 border ${errors.itemName ? 'border-red-500' : 'border-slate-100'} rounded-xl outline-none font-bold shadow-inner focus:border-green-500 text-sm`} placeholder="Enter Product Name" />
                                {errors.itemName && <p className="text-[10px] font-bold text-red-500 mt-1 ml-1 animate-pulse">Bhai, Item ka naam likhna zaroori hai.</p>}
                            </div>
                            {isAddingScannerOpen && (<HighSpeedScannerPopup scannerId="add-reader-popup" showCheckout={false} onScan={(text) => { setBarcode(text); setIsAddingScannerOpen(false); }} onClose={() => setIsAddingScannerOpen(false)} />)}
                            <div className="grid grid-cols-2 gap-3"><div className="relative"><label className="text-[10px] font-black text-slate-400 uppercase">Barcode</label><input value={barcode || ""} onChange={(e) => setBarcode(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl outline-none shadow-inner font-semibold pr-10 text-sm" placeholder="Barcode" /><button onClick={() => setIsAddingScannerOpen(true)} className="absolute right-2 top-7 text-green-600 active:scale-90"><Icon name="ScanBarcode" size={20} /></button></div><div><label className="text-[10px] font-black text-slate-400 uppercase">Unit</label><select className="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl font-bold outline-none shadow-inner text-sm"><option>Pcs</option><option>KG</option><option>LTR</option></select></div></div>
                            <div className="grid grid-cols-2 gap-3">
                                <div>
                                    <label className="text-[10px] font-black text-red-500 uppercase tracking-widest">Last Purchase Cost*</label>
                                    <input type="number" value={purchasePrice || ""} onChange={(e) => { setPurchasePrice(e.target.value); setErrors({ ...errors, purchasePrice: false }); }} className={`w-full p-3 bg-slate-50 border ${errors.purchasePrice ? 'border-red-500' : 'border-slate-100'} rounded-xl outline-none font-bold shadow-inner text-sm`} placeholder="0" />
                                    {errors.purchasePrice && <p className="text-[10px] font-bold text-red-500 mt-1 ml-1 leading-tight animate-pulse">Khareed (Cost) price likhna zaroori hai.</p>}
                                </div>
                                <div>
                                    <label className="text-[10px] font-black text-red-500 uppercase tracking-widest">Retail Price*</label>
                                    <input type="number" value={salePrice || ""} onChange={(e) => { setSalePrice(e.target.value); setErrors({ ...errors, salePrice: false }); }} className={`w-full p-3 bg-slate-50 border ${errors.salePrice ? 'border-red-500' : 'border-slate-100'} rounded-xl outline-none font-bold shadow-inner text-sm`} placeholder="0" />
                                    {errors.salePrice && <p className="text-[10px] font-bold text-red-500 mt-1 ml-1 leading-tight animate-pulse">Farokht (Sale) price likhna zaroori hai.</p>}
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-3"><div><label className="text-[9px] font-black text-orange-500 uppercase ml-1">Wholesale Price</label><input type="number" value={wholesalePrice || ""} onChange={(e) => setWholesalePrice(e.target.value)} className="w-full p-3 bg-slate-50 border border-orange-100 rounded-xl outline-none font-bold shadow-inner text-sm" placeholder="0" /></div><div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Stock</label><input type="number" value={openingStock || ""} onChange={(e) => setOpeningStock(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl outline-none font-bold shadow-inner text-sm" placeholder="0" /></div></div>
                            <div className="grid grid-cols-2 gap-3"><div><label className="text-[10px] font-black text-blue-500 uppercase ml-1">Low Stock Alert</label><input type="number" value={minStock || ""} onChange={(e) => setMinStock(e.target.value)} className="w-full p-3 bg-blue-50 border-blue-100 rounded-xl outline-none font-bold shadow-inner text-sm" placeholder="0" /></div><div><label className="text-[10px] font-black text-orange-500 uppercase ml-1 tracking-widest">Expiry Date</label><input type="date" value={expiryDate || ""} onChange={(e) => setExpiryDate(e.target.value)} className="w-full p-3 bg-orange-50 border-orange-100 rounded-xl font-bold shadow-inner text-sm" /></div></div>
                        </div>
                        <button onClick={handleSave} className={`w-full p-4 text-white rounded-2xl font-bold uppercase shadow-lg text-xs tracking-widest active:scale-95 transition-all mt-4 border-b-4 bg-green-600 border-green-800`}>Save Product</button>
                    </div>
                    {showCatManager && <CategoryManagerModal categories={categories} setCategories={setCategories} onClose={() => setShowCatManager(false)} />}
                </div>
            );
        };

        const CheckoutModal = ({ setIsCheckoutModalOpen, cart, setCart, cartTotal, onComplete, posMode, contactsList, updateCartQty, removeCartItem, clearCart, isWhatsappEnabled, isEditing }) => {
            const [step, setStep] = useState('summary');
            const [partialPaid, setPartialPaid] = useState("");
            const [discountValue, setDiscountValue] = useState("");
            const [discountType, setDiscountType] = useState("flat");
            const [editingPriceItemId, setEditingPriceItemId] = useState(null);
            const [contactSearchQuery, setContactSearchQuery] = useState("");
            const [waCashPhone, setWaCashPhone] = useState("");
            const [missingWANumberContact, setMissingWANumberContact] = useState(null);
            const [tempWANumber, setTempWANumber] = useState("");

            // --- UPDATED LOGIC FOR WA TOGGLE ---
            // Ab hum 'useLocalStorage' use kar rahe hain taake browser isay yaad rakhe
            const [waTogglePref, setWaTogglePref] = useLocalStorage('gs_v4_wa_toggle_pref', true);

            // Asal state ab Settings aur User Preference dono par depend karegi
            const isWaToggled = isWhatsappEnabled && waTogglePref;

            const relevantContactType = (posMode === 'sale' || posMode === 'sale_return') ? 'customer' : 'supplier';
            const relevantContacts = contactsList.filter(c => c.type === relevantContactType && !c.isInactive);
            const filteredRelevantContacts = useMemo(() => relevantContacts.filter(c => (c.name || "").toLowerCase().includes((contactSearchQuery || "").toLowerCase()) || (c.phone && c.phone.includes(contactSearchQuery))), [relevantContacts, contactSearchQuery]);
            const totalQty = useMemo(() => cart.reduce((acc, item) => acc + (parseFloat(item.quantity) || 0), 0), [cart]);
            const discountAmount = useMemo(() => { const val = parseFloat(discountValue) || 0; return (discountType === 'percent') ? (cartTotal * val) / 100 : val; }, [cartTotal, discountValue, discountType]);
            const finalNetTotal = Math.max(0, cartTotal - discountAmount);

            const handleInlineChange = (id, field, value) => { setCart(prev => prev.map(item => { if (item.id === id) { const newObj = { ...item }; if (field === 'price') newObj.priceUsed = value; if (field === 'qty') newObj.quantity = value; if (field === 'salePrice') newObj.salePrice = value; if (field === 'wholesalePrice') newObj.wholesalePrice = value; if (field === 'price' && (posMode === 'purchase' || posMode === 'purchase_return')) newObj.purchasePrice = value; return newObj; } return item; })); };
            const isCartInvalid = useMemo(() => cart.some(item => { const price = parseFloat(item.priceUsed); const qty = parseFloat(item.quantity); return isNaN(price) || price <= 0 || isNaN(qty) || qty <= 0; }), [cart]);

            const triggerComplete = (paymentType, contact = null, isWA = false, paid = 0, customWANumber = null) => {
                let waNumber = null;
                if (isWA) {
                    waNumber = customWANumber || (contact ? contact.phone : waCashPhone);
                }
                onComplete(paymentType, contact, isWA, paid, parseFloat(discountValue) || 0, discountType, discountAmount, waNumber);
            };

            if (step === 'waCashPhone') {
                return (
                    <div className="fixed inset-0 z-[150] bg-slate-900/80 backdrop-blur-md flex items-end justify-center">
                        <div className="bg-white w-full max-sm rounded-t-3xl shadow-2xl p-6 animate-in slide-in-from-bottom text-left">
                            <div className="flex justify-between items-center mb-6">
                                <div className="flex items-center gap-3">
                                    <button onClick={() => setStep('summary')} className="p-2 text-slate-400"><Icon name="ArrowLeft" /></button>
                                    <h3 className="font-bold">WhatsApp Cash Billing</h3>
                                </div>
                                <button onClick={() => setIsCheckoutModalOpen(false)} className="p-2 bg-slate-50 rounded-full"><Icon name="X" /></button>
                            </div>
                            <div className="space-y-4">
                                <div>
                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-2 block">Customer Phone Number</label>
                                    <input
                                        type="tel"
                                        value={waCashPhone}
                                        onChange={(e) => setWaCashPhone(e.target.value)}
                                        placeholder="e.g. 0300 1234567"
                                        className="w-full bg-slate-50 border-2 border-slate-200 p-4 rounded-2xl font-bold outline-none focus:border-green-500 transition-all shadow-inner"
                                        autoFocus
                                    />
                                </div>
                                <button
                                    onClick={() => triggerComplete('Cash', null, true)}
                                    disabled={!waCashPhone}
                                    className={`w-full py-4 rounded-2xl font-bold text-white uppercase text-xs tracking-widest shadow-lg transition-all ${!waCashPhone ? 'bg-slate-300' : 'bg-green-600 active:scale-95'}`}
                                >
                                    Complete & Send WhatsApp
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (step === 'selectContact' || step === 'selectContactWA') {
                const isWA = step === 'selectContactWA';
                return (
                    <div className="fixed inset-0 z-[150] bg-slate-900/80 backdrop-blur-md flex items-end justify-center">
                        <div className="bg-white w-full max-sm rounded-t-3xl shadow-2xl max-h-[95vh] flex flex-col p-4 animate-in slide-in-from-bottom text-left">
                            <div className="flex justify-between items-center mb-4"><div className="flex items-center gap-3"><button onClick={() => setStep('summary')} className="p-2 text-slate-400"><Icon name="ArrowLeft" /></button><h3 className="font-bold text-sm">{isWA ? 'Ledger + WhatsApp' : 'Udhaar Account'}</h3></div><button onClick={() => setIsCheckoutModalOpen(false)} className="p-2 bg-slate-50 rounded-full"><Icon name="X" /></button></div>
                            <div className="bg-blue-50 p-4 rounded-2xl border border-blue-100 mb-4"><label className="text-[10px] font-black text-blue-600 uppercase tracking-widest mb-2 block">Cash Paid Today (Optional)</label><div className="flex items-center bg-white border-2 border-blue-200 rounded-xl px-4 py-2 shadow-sm"><span className="font-bold text-blue-600 mr-2 text-sm">Rs.</span><input type="number" value={partialPaid || ""} onChange={(e) => setPartialPaid(e.target.value)} placeholder="0.00" className="w-full bg-transparent outline-none font-bold text-sm" /></div><p className="text-[9px] text-blue-400 mt-2 font-bold uppercase italic">Remaining Rs. {formatAmount(finalNetTotal - (parseFloat(partialPaid) || 0))} will be added to ledger</p></div>
                            <div className="px-2 mb-2"><div className="relative"><Icon name="Search" size={14} className="absolute left-3 top-3 text-slate-400" /><input type="text" placeholder="Search by name or phone..." value={contactSearchQuery || ""} onChange={(e) => setContactSearchQuery(e.target.value)} className="w-full bg-slate-100 border border-slate-200 p-2 pl-9 rounded-xl outline-none text-xs font-semibold shadow-inner focus:border-blue-400 transition-all" /></div></div>
                            <div className="flex-1 overflow-y-auto space-y-2 no-scrollbar p-2"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">Select Account</label>{filteredRelevantContacts.length === 0 ? (<div className="py-8 text-center opacity-30"><Icon name="UserSearch" size={32} /><p className="text-[10px] font-bold mt-2 uppercase tracking-widest">No matching accounts</p></div>) : (filteredRelevantContacts.map(contact => {
                                const isLenaHai = contact.balance < 0;
                                return (<button key={contact.id} onClick={() => {
                                    if (isWA && !contact.phone) {
                                        setMissingWANumberContact(contact);
                                        setTempWANumber("");
                                        setStep('missingWA');
                                    } else {
                                        triggerComplete('Credit', contact, isWA, parseFloat(partialPaid) || 0);
                                    }
                                }} className="w-full p-4 bg-slate-50 rounded-2xl flex items-center gap-4 text-left active:bg-slate-100 transition-all border border-slate-100 shadow-sm"><div className="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center font-bold text-blue-600 shrink-0">{contact.name.charAt(0)}</div><div className="flex-1 min-w-0 pr-2"><p className="font-bold truncate text-sm">{contact.name}</p><p className="text-[10px] text-slate-400 font-bold tracking-wider">{contact.phone || "No Number"}</p></div><div className="text-right"><p className={`text-[10px] font-black ${isLenaHai ? 'text-red-600' : 'text-green-600'}`}>Rs. {formatAmount(Math.abs(contact.balance))}</p><p className={`text-[8px] font-bold uppercase tracking-tighter ${isLenaHai ? 'text-red-600' : 'text-green-600'}`}>{isLenaHai ? 'Lena Hai' : (contact.balance > 0 ? 'Dena Hai' : 'Clear')}</p></div></button>);
                            }))}</div>
                        </div>
                    </div>
                );
            }

            if (step === 'missingWA') {
                return (
                    <div className="fixed inset-0 z-[150] bg-slate-900/80 backdrop-blur-md flex items-end justify-center">
                        <div className="bg-white w-full max-sm rounded-t-3xl shadow-2xl p-6 animate-in slide-in-from-bottom text-left">
                            <div className="flex justify-between items-center mb-6">
                                <div className="flex items-center gap-3">
                                    <button onClick={() => setStep('selectContactWA')} className="p-2 text-slate-400"><Icon name="ArrowLeft" /></button>
                                    <h3 className="font-bold">Add WhatsApp Number</h3>
                                </div>
                                <button onClick={() => setIsCheckoutModalOpen(false)} className="p-2 bg-slate-50 rounded-full"><Icon name="X" /></button>
                            </div>
                            <div className="space-y-4">
                                <div className="bg-amber-50 p-4 rounded-2xl border border-amber-200 mb-2">
                                    <p className="text-xs font-bold text-amber-800">WhatsApp number is missing for <span className="underline">{missingWANumberContact?.name}</span>.</p>
                                    <p className="text-[10px] text-amber-600 mt-1 uppercase font-black">Please add number in ledger to proceed.</p>
                                </div>
                                <div>
                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-2 block">WhatsApp Number (11 Digits)</label>
                                    <input
                                        type="tel"
                                        value={tempWANumber}
                                        onChange={(e) => setTempWANumber(e.target.value)}
                                        placeholder="e.g. 0300 1234567"
                                        maxLength={11}
                                        className="w-full bg-slate-50 border-2 border-slate-200 p-4 rounded-2xl font-bold outline-none focus:border-green-500 transition-all shadow-inner"
                                        autoFocus
                                    />
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    <button
                                        onClick={() => setStep('selectContactWA')}
                                        className="py-4 rounded-2xl font-bold text-slate-600 bg-slate-100 uppercase text-xs tracking-widest active:scale-95 transition-all"
                                    >
                                        Cancel
                                    </button>
                                    <button
                                        onClick={() => {
                                            if (tempWANumber.length !== 11) {
                                                alert("Number poora 11 hindson ka hona chahiye.");
                                                return;
                                            }
                                            onComplete('Credit', missingWANumberContact, true, parseFloat(partialPaid) || 0, parseFloat(discountValue) || 0, discountType, discountAmount, tempWANumber, true);
                                        }}
                                        disabled={tempWANumber.length < 11}
                                        className={`py-4 rounded-2xl font-bold text-white uppercase text-xs tracking-widest shadow-lg transition-all ${tempWANumber.length < 11 ? 'bg-slate-300' : 'bg-green-600 active:scale-95'}`}
                                    >
                                        Save & Send
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="fixed inset-0 z-[150] bg-slate-900/80 backdrop-blur-md flex items-end justify-center">
                    <div className="bg-white w-full max-sm rounded-t-3xl shadow-2xl max-h-[95vh] flex flex-col p-4 animate-in slide-in-from-bottom text-left">
                        <div className="flex justify-between items-center mb-4"><h3 className="font-bold text-lg">{isEditing ? 'Update Bill' : 'Review Items'}</h3><div className="flex items-center gap-2">{cart.length > 0 && <button onClick={clearCart} className="text-red-500 font-bold text-[10px] uppercase px-3 py-1 bg-red-50 rounded-lg active:scale-90 shadow-sm">Clear</button>}<button onClick={() => setIsCheckoutModalOpen(false)} className="p-2 bg-slate-50 rounded-full"><Icon name="X" /></button></div></div>
                        <div className="flex-1 overflow-y-auto space-y-3 no-scrollbar pb-6">{cart.map(item => (<div key={item.id} className="bg-slate-50 p-3 rounded-xl border border-slate-100 flex flex-col gap-2"><div className="flex justify-between items-start"><div className="flex-1 pr-2"><p className="text-sm font-bold truncate">{item.name}</p><p className="text-[9px] text-slate-400 font-black uppercase tracking-widest">{posMode === 'purchase' ? 'Stock Update' : posMode === 'sale_return' ? 'Sale Return' : posMode === 'purchase_return' ? 'Purchase Return' : 'Unit Sale'}</p></div><button onClick={() => removeCartItem(item.id)} className="text-red-300 active:scale-90 p-1"><Icon name="Trash2" size={14} /></button></div><div className="grid grid-cols-12 gap-2 items-stretch"><div className="col-span-4 flex flex-col"><label className="text-[8px] font-black text-slate-400 uppercase tracking-tighter block mb-1">Unit Price</label><div className="flex items-center bg-white border border-slate-200 rounded-lg px-2 h-10 shadow-sm focus-within:border-blue-400 transition-all"><input type="number" step="any" value={item.priceUsed === 0 ? "0" : (item.priceUsed || "")} onChange={(e) => handleInlineChange(item.id, 'price', e.target.value)} className="w-full bg-transparent outline-none font-bold text-xs text-blue-600" placeholder="Rate" /></div></div><div className="col-span-4 flex flex-col"><label className="text-[8px] font-black text-slate-400 uppercase tracking-tighter block mb-1">Quantity</label><div className="flex items-center bg-white border border-slate-200 rounded-lg h-10 shadow-sm overflow-hidden focus-within:border-blue-400 transition-all"><button onClick={() => updateCartQty(item.id, -1)} className="w-8 h-full bg-slate-50 text-slate-500 hover:bg-slate-100 border-r active:scale-90 transition-all font-bold" > - </button><input type="number" step="any" value={item.quantity === 0 ? "0" : (item.quantity || "")} onChange={(e) => handleInlineChange(item.id, 'qty', e.target.value)} className="w-full bg-transparent outline-none font-bold text-xs text-center px-1" placeholder="Qty" /><button onClick={() => updateCartQty(item.id, 1)} className="w-8 h-full bg-slate-50 text-slate-500 hover:bg-slate-100 border-l active:scale-90 transition-all font-bold" > + </button></div></div><div className="col-span-4 text-right flex flex-col justify-center"><label className="text-[8px] font-black text-slate-400 uppercase tracking-tighter block mb-1">Total</label><p className="font-black text-sm text-slate-900 truncate">Rs. {formatAmount((parseFloat(item.priceUsed) * parseFloat(item.quantity) || 0))}</p></div></div>{posMode === 'purchase' && (<button onClick={() => setEditingPriceItemId(editingPriceItemId === item.id ? null : item.id)} className="flex items-center gap-1.5 text-[10px] font-bold text-orange-600 bg-orange-50 w-fit px-3 py-1 rounded-full border border-orange-100 active:scale-95" ><Icon name="Settings2" size={10} /> Edit Retail/Wholesale Prices </button>)}{posMode === 'purchase' && editingPriceItemId === item.id && (<div className="grid grid-cols-2 gap-2 p-3 bg-white rounded-lg border-2 border-orange-100 animate-in slide-in-from-top duration-200"><div><label className="text-[8px] font-black text-slate-400 uppercase block mb-1">New Sale Price</label><input type="number" step="any" value={item.salePrice || ""} onChange={(e) => handleInlineChange(item.id, 'salePrice', e.target.value)} className="w-full h-10 bg-slate-50 border border-slate-200 px-2 rounded text-xs font-bold outline-none focus:border-orange-400" /></div><div><label className="text-[8px] font-black text-slate-400 uppercase block mb-1">New Wholesale Price</label><input type="number" step="any" value={item.wholesalePrice || ""} onChange={(e) => handleInlineChange(item.id, 'wholesalePrice', e.target.value)} className="w-full h-10 bg-slate-50 border border-slate-200 px-2 rounded text-xs font-bold outline-none focus:border-orange-400" /></div></div>)}</div>))}</div>
                        <div className="bg-red-50 p-4 rounded-xl border border-red-100 mb-3 space-y-2"><div className="flex justify-between items-center"><label className="text-[10px] font-black text-red-600 uppercase tracking-widest">Apply Discount</label><div className="flex bg-white rounded-lg p-1 border shadow-sm"><button onClick={() => setDiscountType('flat')} className={`px-3 py-1 text-[10px] font-bold rounded ${discountType === 'flat' ? 'bg-red-600 text-white' : 'text-slate-400'}`} > Rs. </button><button onClick={() => setDiscountType('percent')} className={`px-3 py-1 text-[10px] font-bold rounded ${discountType === 'percent' ? 'bg-red-600 text-white' : 'text-slate-400'}`} > % </button></div></div><div className="flex items-center gap-3"><div className="flex-1 relative"><input type="number" step="any" value={discountValue || ""} onChange={(e) => setDiscountValue(e.target.value)} placeholder={`Enter ${discountType === 'flat' ? 'Amount' : 'Percentage'}...`} className="w-full h-12 bg-white border-2 border-red-100 px-4 rounded-xl font-bold text-sm outline-none focus:border-red-400 shadow-inner" /><div className="absolute right-4 top-3.5 opacity-30"><Icon name="Tag" size={16} /></div></div>{discountAmount > 0 && (<div className="bg-white px-3 py-2 rounded-lg border border-red-200 text-right min-w-[100px] shadow-sm"><p className="text-[8px] font-black text-red-400 uppercase tracking-tighter">Save</p><p className="text-sm font-black text-red-600">-Rs.{formatAmount(discountAmount)}</p></div>)}</div></div>
                        <div className="mt-2 space-y-2 shrink-0 border-t pt-4">
                            {isCartInvalid && (<p className="text-[10px] font-bold text-red-500 text-center animate-pulse mb-2"> Rate aur Quantity check karein. </p>)}
                            <div className="bg-slate-900 text-white p-4 rounded-xl flex justify-between items-center shadow-lg"><div><p className="text-[10px] font-black text-white/50 uppercase tracking-[0.2em]">Final Net Amount</p><p className="text-2xl font-black">Rs. {formatAmount(finalNetTotal)}</p></div><div className="text-right"><p className="text-[10px] font-bold text-white/50">{totalQty} Items</p>{discountAmount > 0 && <p className="text-[9px] font-bold text-red-400 line-through opacity-60">Rs. {formatAmount(cartTotal)}</p>}</div></div>

                            <div className="flex gap-2 mt-2 items-stretch">
                                <button
                                    onClick={() => isWaToggled ? setStep('waCashPhone') : triggerComplete('Cash')}
                                    disabled={isCartInvalid || cart.length === 0}
                                    className={`flex-1 p-4 rounded-xl font-bold active:scale-95 transition-all shadow-md uppercase text-xs tracking-widest flex flex-row items-center justify-center gap-2 ${isCartInvalid ? 'bg-slate-300 text-slate-500' : (isWaToggled ? 'bg-emerald-600 text-white' : 'bg-green-600 text-white')}`}
                                >
                                    {isWaToggled && (
                                        <img
                                            src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/WhatsApp.svg/120px-WhatsApp.svg.png"
                                            className="w-4 h-4 object-contain brightness-0 invert"
                                            alt="WA"
                                        />
                                    )}
                                    <span>{isEditing ? 'Update Cash' : (posMode.includes('return') ? 'Return Cash' : 'Full Cash')}</span>
                                </button>

                                {isWhatsappEnabled && !isEditing && (
                                    <button
                                        onClick={() => setWaTogglePref(!waTogglePref)}
                                        className={`w-14 rounded-xl flex items-center justify-center shadow-md active:scale-90 transition-all border-2 shrink-0 overflow-hidden ${isWaToggled ? 'bg-white border-green-500' : 'bg-slate-50 border-slate-200'}`}
                                    >
                                        <img
                                            src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/WhatsApp.svg/120px-WhatsApp.svg.png"
                                            alt="WhatsApp"
                                            className={`w-8 h-8 object-contain transition-all ${isWaToggled ? 'opacity-100' : 'opacity-30 grayscale'}`}
                                        />
                                    </button>
                                )}

            const mainScrollRef = useRef(null);

            // --- SCROLL TO HIDE HEADER STATE ---
            const [showHeader, setShowHeader] = useState(true);
            const lastScrollY = useRef(0);
            const isToggling = useRef(false);

            useEffect(() => {
                setShowHeader(true);
                lastScrollY.current = 0;
                if (mainScrollRef.current) mainScrollRef.current.scrollTop = 0;
            }, [activeTab]);

            const handleGlobalScroll = useCallback((e) => {
                if (isToggling.current) return; // Glitch rokne ke liye: animation complete hone ka wait karein

                const target = e.target;
                // Sirf main containers par scroll track karein jin ki height zyada ho
                if (target.scrollHeight - target.clientHeight < 50) return;

                const currentScrollY = target.scrollTop;

                // Screen ke bilkul top par hamesha dikhayein
                if (currentScrollY <= 10) {
                    if (!showHeader) {
                        setShowHeader(true);
                        isToggling.current = true;
                        setTimeout(() => isToggling.current = false, 400);
                    }
                    lastScrollY.current = currentScrollY;
                    return;
                }

                if (currentScrollY > lastScrollY.current + 20) {
                    // Neeche scroll karne par chupayein
                    if (showHeader) {
                        setShowHeader(false);
                        isToggling.current = true;
                        setTimeout(() => isToggling.current = false, 400); // 400ms delay to prevent bounce glitch
                    }
                    lastScrollY.current = currentScrollY;
                } else if (currentScrollY < lastScrollY.current - 20) {
                    // Upar scroll karne par wapis layein

                        setShowHeader(true);

            const [isRomanUrduEnabled, setIsRomanUrduEnabled] = useLocalStorage('gs_v4_roman_urdu_enabled', true);
            const [invCounter, setInvCounter] = useLocalStorage('gs_v4_inv_counter', 1);
            const [paymentDetails, setPaymentDetails] = useLocalStorage('gs_v4_payment_details', '');
            const [paymentQR, setPaymentQR] = useLocalStorage('gs_v4_payment_qr', null);
            const [categories, setCategories] = useLocalStorage('gs_v4_categories', []);
            const [productCategoryId, setProductCategoryId] = useState("all");

            // --- BLUETOOTH PRINTER STATE ---
            const [isPrinterConnected, setIsPrinterConnected] = useState(false);
            const [connectedPrinterName, setConnectedPrinterName] = useState("");
            const [isPrinterConnecting, setIsPrinterConnecting] = useState(false);

            // --- SUCCESS ANIMATION STATE ---
            const [showSuccessAnimation, setShowSuccessAnimation] = useState(false);

            const triggerSuccess = () => {
                setShowSuccessAnimation(true);
                playBeep();
                setTimeout(() => setShowSuccessAnimation(false), 900); // < 1 second animation
            };

            // New state for persisting card template selection
            const [cardTemplateIndex, setCardTemplateIndex] = useLocalStorage('gs_v4_card_template_index', 0);

            // --- LICENSE & SECURITY SYSTEM ---
            const [deviceId] = useLocalStorage('gs_v4_device_id', 'DEV-' + Math.random().toString(36).substr(2, 9).toUpperCase());
            const [licenseKeyInput, setLicenseKeyInput] = useState("");

            // Simple Security Hash (Client Side)
            const SALT = "PAK_POS_SECURE_SALT_786";

            const generateHash = (str) => {
                let hash = 0;
                for (let i = 0; i < str.length; i++) {
                    const char = str.charCodeAt(i);
                    hash = ((hash << 5) - hash) + char;
                    hash = hash & hash;
                }
                return Math.abs(hash).toString(16).toUpperCase();
            };

            const validateLicenseKey = (key, currentDeviceId) => {
                try {
                    const parts = key.split('-');
                    if (parts[0] !== 'LIC' || parts.length !== 3) return null;

                    // Add padding back if needed for atob
                    let payload = parts[1];
                    while (payload.length % 4) payload += '=';

                    const expiryStr = atob(payload);
                    const signature = parts[2];

                    const expectedSignature = generateHash(currentDeviceId + expiryStr + SALT);

                    if (signature === expectedSignature) {
                        return expiryStr; // Valid Date String
                    }
                    return null;
                } catch (e) { return null; }
            };

            const handleLicenseActivation = () => {
                const result = validateLicenseKey(licenseKeyInput.trim(), deviceId);

                if (result) {
                    const newExpiry = result;
                    // Check if already expired

                        alert("Yeh License Key expire ho chuka hai.");

                startDate: getIsoDate(),
                expiryDate: new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0] // 7 days default
            });

            const isSubscriptionActive = useMemo(() => {
                const today = getIsoDate();
                return subscription.expiryDate >= today;
            }, [subscription]);

            const daysLeft = useMemo(() => {
                const today = new Date(getIsoDate());
                const expiry = new Date(subscription.expiryDate);
                const diffTime = expiry - today;
                return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            }, [subscription]);

            const checkPermission = () => {
                if (!isSubscriptionActive) {
                    setIsPremiumModalOpen(true);
                    return false;
                }
                return true;
            };
            // ----------------------------------

            // Bluetooth Printer Connect Function
            const handleConnectPrinter = async () => {
                if (!navigator.bluetooth) {
                    alert("Aapka browser Bluetooth support nahi karta. Chrome istemal karein.");
                    return;
                }

                setIsPrinterConnecting(true);
                try {
                    // Note: We use acceptAllDevices because generic thermal printers use different UUIDs.
                    // However, we now enforce a real GATT connection to ensure it's a valid device.
                    const device = await navigator.bluetooth.requestDevice({
                        acceptAllDevices: true,
                        optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb'] // Common printer service
                    });

                    // CRITICAL FIX: Actually attempt to connect to the GATT server
                    // This prevents showing "Connected" for random devices that are not reachable or supported
                    const server = await device.gatt.connect();

                    setConnectedPrinterName(device.name || "Bluetooth Printer");
                    setIsPrinterConnected(true);

                                <h3 className="text-2xl font-black text-slate-800 mb-1 uppercase tracking-tight">Plan Khatam!</h3>
                                <p className="text-xs font-bold text-slate-500 mb-6 leading-relaxed">Aapka free trial ya plan khatam ho gaya hai. Apna hisaab kitab jari rakhne ke liye renew karein.</p>

                                <div className="space-y-3">
                                    <a href="https://wa.me/923197090233?text=My subscription expired. I want to renew." target="_blank" className="w-full py-4 bg-green-600 text-white rounded-xl font-bold uppercase text-xs tracking-widest flex items-center justify-center gap-2 shadow-lg active:scale-95 transition-all">
                                        <Icon name="MessageCircle" size={18} /> WhatsApp Par Renew Karein
                                    </a>
                                    <button onClick={() => { setIsPremiumModalOpen(false); navigateToTab('settings'); setSettingsView('premium'); }} className="w-full py-3 bg-slate-100 text-slate-700 rounded-xl font-bold uppercase text-[10px] tracking-widest active:scale-95">
                                        Packages Dekhein
                                    </button>
                                </div>
                                <p className="mt-6 text-[9px] font-bold text-slate-400">Support: 0319-7090233</p>
                            </div>
                        </div>
                    )}

                    {stockError && <div className="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-[500] w-64 bg-white p-6 rounded-3xl shadow-2xl border-2 border-red-500 text-center"><div className="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-3 text-red-600"><Icon name="AlertCircle" size={28} /></div><h3 className="font-bold mb-1 text-sm">Masla!</h3><p className="text-[11px] text-slate-500 mb-4">{stockError}</p><button onClick={() => setStockError(null)} className="w-full py-2 bg-slate-800 text-white rounded-xl font-bold text-xs uppercase">Theek Hai</button></div>}
                    {selectedViewTx && <BillPreviewModal tx={selectedViewTx} shopName={shopName} shopPhone={shopPhone} shopAddress={shopAddress} shopLogo={shopLogo} paymentDetails={paymentDetails} paymentQR={paymentQR} billWidth={billWidth} onClose={() => setSelectedViewTx(null)} />}
                    {isAddModalOpen && (<AddProductModal editingProduct={editingProduct} itemName={itemName} setItemName={setItemName} barcode={barcode} setBarcode={setBarcode} purchasePrice={purchasePrice} setPurchasePrice={setPurchasePrice} salePrice={salePrice} setSalePrice={setSalePrice} wholesalePrice={wholesalePrice} setWholesalePrice={setWholesalePrice} openingStock={openingStock} setOpeningStock={setOpeningStock} minStock={minStock} setMinStock={setMinStock} expiryDate={expiryDate} setExpiryDate={setExpiryDate} productImage={productImage} setProductImage={setProductImage} setIsAddModalOpen={setIsAddModalOpen} resetProductForm={resetProductForm} productsList={productsList} setProductsList={setProductsList} setStockError={setStockError} categories={categories} setCategories={setCategories} productCategoryId={productCategoryId} setProductCategoryId={setProductCategoryId} />)}
                    {isCheckoutModalOpen && (<CheckoutModal setIsCheckoutModalOpen={setIsCheckoutModalOpen} cart={cart} setCart={setCart} cartTotal={cartTotal} posMode={posMode} onComplete={handleCheckout} contactsList={contactsList} updateCartQty={updateCartQty} removeCartItem={removeCartItem} clearCart={clearCart} isWhatsappEnabled={isWhatsappEnabled} isEditing={!!editingTxId} />)}
                    {isLedgerActionModalOpen && (<div className="fixed inset-0 z-[200] bg-black/80 flex items-center justify-center p-4"> <div className="bg-white w-full max-sm rounded-3xl p-6 space-y-4 shadow-2xl text-left"> <div className="flex justify-between items-center border-b pb-2"><h3 className="font-bold text-slate-800 text-lg">{editingTxId ? 'Update Entry' : (ledgerActionType === 'receipt' ? 'Recovery Receipt' : 'Payment Voucher')}</h3><button onClick={() => { setIsLedgerActionModalOpen(false); handleCancelEdit(); }} className="p-2 text-slate-400"><Icon name="X" /></button></div> <div className="space-y-4"> <input type="number" step="any" value={ledgerAmount || ""} onChange={(e) => setLedgerAmount(e.target.value)} className="w-full bg-slate-50 border p-4 rounded-2xl font-bold text-lg outline-none" placeholder="0.00" autoFocus /> <input type="text" value={ledgerDesc || ""} onChange={(e) => setLedgerDesc(e.target.value)} className="w-full bg-slate-50 border p-4 rounded-2xl font-bold outline-none" placeholder="Note (Optional)" /> </div> <button onClick={handleLedgerAction} className={`w-full py-4 rounded-2xl font-bold text-white uppercase text-xs tracking-widest ${ledgerActionType === 'receipt' ? 'bg-green-600' : 'bg-red-600'}`}>{editingTxId ? 'Update Karein' : 'Confirm Karein'}</button> </div> </div>)}

                    {isExpenseModalOpen && (
                        <div className="fixed inset-0 z-[200] bg-black/80 flex items-center justify-center p-4">
                            <div className="bg-white w-full max-sm rounded-3xl p-6 space-y-4 shadow-2xl animate-in zoom-in duration-300 text-left">
                                <div className="flex justify-between items-center border-b pb-2"><h3 className="font-bold text-slate-800 text-lg">{editingTxId ? 'Update Expense' : 'Add New Expense'}</h3><button onClick={() => { setIsExpenseModalOpen(false); handleCancelEdit(); }} className="p-2 text-slate-400"><Icon name="X" /></button></div>
                                <div className="space-y-3">
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase ml-1">Date</label><input type="date" value={expenseDate || ""} onChange={(e) => setExpenseDate(e.target.value)} className="w-full bg-slate-50 border p-3 rounded-xl font-bold outline-none text-sm" /></div>
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase ml-1">Amount</label><input type="number" value={expenseAmount || ""} onChange={(e) => setExpenseAmount(e.target.value)} className="w-full bg-slate-50 border p-3 rounded-xl font-bold text-lg outline-none" placeholder="0.00" autoFocus /></div>
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase ml-1">Description (Detail)</label><input type="text" value={expenseDesc || ""} onChange={(e) => setExpenseDesc(e.target.value)} className="w-full bg-slate-50 border p-3 rounded-xl font-bold outline-none text-sm" placeholder="e.g. Shop Rent, Bijli Bill, Chai Pani" /></div>
                                </div>
                                <button onClick={handleAddExpenseAction} className="w-full py-4 rounded-2xl font-bold text-white uppercase text-xs tracking-widest bg-red-600 border-b-4 border-red-800 shadow-lg active:scale-95 transition-all">{editingTxId ? 'Update Expense' : 'Save Expense'}</button>
                            </div>
                        </div>
                    )}

                    {isDeleteTxModalOpen && <div className="fixed inset-0 z-[200] bg-black/80 flex items-center justify-center p-4"><div className="bg-white w-full max-sm rounded-3xl p-6 text-center shadow-2xl"><Icon name="AlertTriangle" size={48} className="text-red-500 mb-4 mx-auto" /><h3 className="text-xl font-bold text-slate-800 text-sm">Delete Transaction?</h3><div className="grid grid-cols-2 gap-3 mt-6"><button onClick={() => setIsDeleteTxModalOpen(false)} className="py-3 bg-slate-100 rounded-2xl font-bold text-slate-600 uppercase text-xs">Nahi</button><button onClick={() => handleDeleteTransaction()} className="py-3 bg-red-600 text-white rounded-2xl font-bold uppercase text-xs">Haan</button></div></div></div>}
                    {isDeleteAccountModalOpen && (<div className="fixed inset-0 z-[200] bg-black/80 flex items-center justify-center p-4"> <div className="bg-white w-full max-sm rounded-3xl p-6 text-center shadow-2xl text-left"> <Icon name="AlertTriangle" size={48} className="text-red-500 mb-4 mx-auto" /><h3 className="text-lg font-bold text-slate-800 text-center">Delete Account?</h3> <div className="grid grid-cols-2 gap-3 mt-6"><button onClick={() => setIsDeleteAccountModalOpen(false)} className="py-3 bg-slate-100 rounded-2xl font-bold text-slate-600 uppercase text-xs text-center">Nahi</button><button onClick={() => { setContactsList(prev => prev.filter(c => c.id !== accountToDeleteId)); setIsDeleteAccountModalOpen(false); setAccountToDeleteId(null); setSelectedLedger(null); navigateToTab('ledgers'); }} className="py-3 bg-red-600 text-white rounded-2xl font-bold uppercase text-xs shadow-lg text-center">Haan, Delete Karein</button></div> </div> </div>)}
                    <nav className="fixed bottom-0 left-0 right-0 bg-white border-t px-2 py-3 shadow-lg z-50">
                        <div className="max-w-md mx-auto flex justify-between items-center px-2">
                            <button onClick={() => { navigateToTab('dashboard'); handleCancelEdit(); }} className={`flex flex-col items-center flex-1 ${activeTab === 'dashboard' ? 'text-blue-600 font-bold' : 'text-slate-400'}`}><Icon name="LayoutDashboard" /><span className="text-[10px] mt-1 uppercase font-bold">Home</span></button>
                            <button onClick={() => { navigateToTab('ledgers'); handleCancelEdit(); }} className={`flex flex-col items-center flex-1 ${activeTab === 'ledgers' ? 'text-blue-600 font-bold' : 'text-slate-400'}`}><Icon name="Users" /><span className="text-[10px] mt-1 uppercase font-bold">Ledgers</span></button>
                            <button onClick={() => navigateToTab('pos')} className="flex flex-col items-center flex-1 -mt-8 relative"><div className={`p-4 rounded-full shadow-lg border-4 border-white flex items-center justify-center ${activeTab === 'pos' ? 'bg-green-600' : 'bg-slate-800'} text-white`}><Icon name="ShoppingCart" /></div><span className={`text-[10px] mt-1 uppercase font-bold ${activeTab === 'pos' ? 'text-blue-600' : 'text-slate-400'}`}>POS</span></button>
                            <button onClick={() => { navigateToTab('products'); handleCancelEdit(); }} className={`flex flex-col items-center flex-1 ${activeTab === 'products' || activeTab === 'performance' ? 'text-blue-600' : 'text-slate-400'}`}><Icon name="Package" /><span className="text-[10px] mt-1 uppercase font-bold">Products</span></button>
                            <button onClick={() => { navigateToTab('settings'); handleCancelEdit(); }} className={`flex flex-col items-center flex-1 ${activeTab === 'settings' ? 'text-blue-600' : 'text-slate-400'}`}><Icon name="Settings" /><span className="text-[10px] mt-1 uppercase font-bold">Settings</span></button>
                        </div>
                    </nav>
                    <input type="file" id="p_img_cam" className="hidden" accept="image/*" capture="environment" onChange={handleProductImageChange} />
                    <input type="file" id="p_img_gal" className="hidden" accept="image/*" onChange={handleProductImageChange} />
                    {isAddContactModalOpen && (<div className="fixed inset-0 z-[150] bg-black/60 backdrop-blur-sm flex items-end justify-center"> <div className="bg-white w-full max-sm rounded-t-3xl shadow-2xl p-6 space-y-4 animate-in slide-in-from-bottom text-left"> <div className="flex justify-between items-center"><h3 className="text-xl font-bold">New Account</h3><button onClick={() => { setIsAddContactModalOpen(false); setContactErrors({}); }} className="p-2 text-slate-400"><Icon name="X" /></button></div> <div className="bg-slate-100 p-1 rounded-xl flex items-center mb-2"><button onClick={() => setContactListTab('customer')} className={`flex-1 py-2 rounded-lg text-xs font-bold ${contactListTab === 'customer' ? 'bg-white shadow-sm text-slate-800' : 'text-slate-500'}`}>Customer</button><button onClick={() => setContactListTab('supplier')} className={`flex-1 py-2 rounded-lg text-xs font-bold ${contactListTab === 'supplier' ? 'bg-white shadow-sm text-slate-800' : 'text-slate-500'}`}>Supplier</button></div>
                        <div className="space-y-3">
                            <div>
                                <input id="cn" type="text" placeholder="Full Name*" className={`w-full bg-slate-50 border ${contactErrors.name ? 'border-red-500' : 'bg-slate-50 border-slate-50'} p-4 rounded-2xl outline-none font-semibold text-sm`} onChange={() => setContactErrors(prev => ({ ...prev, name: false }))} />
                                {contactErrors.name && <p className="text-[10px] font-bold text-red-500 mt-1 ml-1 animate-pulse">Bhai, account ka naam likhna zaroori hai.</p>}
                            </div>
                            <div>
                                <input
                                    id="cp"
                                    type="tel"
                                    placeholder="WhatsApp Number (Optional)"
                                    maxLength={11}
                                    className={`w-full bg-slate-50 border ${contactErrors.phone ? 'border-red-500' : 'bg-slate-50 border-slate-50'} p-4 rounded-2xl outline-none font-semibold text-sm`}
                                    onChange={(e) => {
                                        // Restrict to numbers only
                                        e.target.value = e.target.value.replace(/\D/g, '').slice(0, 11);
                                        setContactErrors(prev => ({ ...prev, phone: false }));
                                    }}
                                />
                                {contactErrors.phone && <p className="text-[10px] font-bold text-red-500 mt-1 ml-1 animate-pulse">Number poora 11 hindson ka hona chahiye (ya khaali chor dein).</p>}
                            </div>

                            <div>
                                <input id="cb" type="number" step="any" placeholder="Sabiqa Baqaya (Opening Balance)" className="w-full bg-slate-50 border p-4 rounded-2xl outline-none font-semibold text-sm" />
                                <div className="flex gap-2 mt-2">
                                    <button onClick={() => setOpeningBalType('receivable')} className={`flex-1 py-3 rounded-xl text-xs font-bold border transition-all ${openingBalType === 'receivable' ? 'bg-green-100 border-green-500 text-green-700 shadow-sm' : 'bg-slate-50 border-slate-100 text-slate-400'}`}>Mainay Leny Hain<br />(Receivable)</button>
                                    <button onClick={() => setOpeningBalType('payable')} className={`flex-1 py-3 rounded-xl text-xs font-bold border transition-all ${openingBalType === 'payable' ? 'bg-red-100 border-red-500 text-red-700 shadow-sm' : 'bg-slate-50 border-slate-100 text-slate-400'}`}>Mainay Deny Hain<br />(Payable)</button>
                                </div>
                            </div>
                        </div>
                        <button onClick={() => {
                            const n = document.getElementById('cn').value;
                            const p = document.getElementById('cp').value;
                            const b = document.getElementById('cb').value;

                            const newErrors = {};
                            if (!n) newErrors.name = true;
                            if (p && p.length !== 11) { newErrors.phone = true; }

                            if (Object.keys(newErrors).length > 0) {
                                setContactErrors(newErrors);
                                setStockError("Naam zaroori hai. Number agar likha hai to poora likhein.");
                                return;
                            }

                            const rawBalance = parseFloat(b) || 0;
                            const finalBalance = openingBalType === 'receivable' ? -Math.abs(rawBalance) : Math.abs(rawBalance);

                            const newContactId = Date.now();
                            const newContact = { id: newContactId, name: n, phone: p, balance: finalBalance, type: contactListTab, isInactive: false };
                            setContactsList([...contactsList, newContact]);

                            if (rawBalance > 0) {
                                const openingTx = {
                                    id: `OP-${newContactId}`,
                                    type: 'Opening Balance',
                                    contactId: newContactId,
                                    contactName: n,
                                    amount: rawBalance,
                                    paidAmount: 0,
                                    date: getIsoDate(),
                                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                                    description: `Sabiqa Baqaya (${openingBalType === 'receivable' ? 'Lena hai' : 'Dena hai'})`,
                                    paymentType: 'Credit'
                                };
                                setTransactionsList(prev => [openingTx, ...prev]);
                            }

                            setIsAddContactModalOpen(false);
                            setContactErrors({});
                        }} className="w-full bg-green-600 text-white py-4 rounded-2xl font-bold uppercase shadow-lg text-xs tracking-widest active:scale-95 transition-all">Save Account</button> </div> </div>)}
                    {isEditContactModalOpen && contactToEdit && (<div className="fixed inset-0 z-[150] bg-black/60 backdrop-blur-sm flex items-end justify-center"> <div className="bg-white w-full max-sm rounded-t-3xl shadow-2xl p-6 space-y-4 animate-in slide-in-from-bottom text-left"> <div className="flex justify-between items-center"><h3 className="text-xl font-bold">Edit Account</h3><button onClick={() => { setIsEditContactModalOpen(false); setContactErrors({}); }} className="p-2 text-slate-400"><Icon name="X" /></button></div> <div className="space-y-3"> <div> <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">Name</label> <input id="edit_cn" type="text" defaultValue={contactToEdit.name || ""} className={`w-full bg-slate-50 border ${contactErrors.name ? 'border-red-500' : 'border-slate-50'} p-4 rounded-2xl outline-none font-semibold text-sm focus:border-blue-400`} onChange={() => setContactErrors(prev => ({ ...prev, name: false }))} /> </div> <div> <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">WhatsApp Number</label> <input id="edit_cp" type="tel" defaultValue={contactToEdit.phone || ""} maxLength={11} className={`w-full bg-slate-50 border ${contactErrors.phone ? 'border-red-500' : 'border-slate-50'} p-4 rounded-2xl outline-none font-semibold text-sm focus:border-blue-400`} onChange={(e) => { e.target.value = e.target.value.replace(/\D/g, '').slice(0, 11); setContactErrors(prev => ({ ...prev, phone: false })); }} /> </div> </div> <button onClick={() => { const n = document.getElementById('edit_cn').value; const p = document.getElementById('edit_cp').value; const newErrors = {}; if (!n) newErrors.name = true; if (p && p.length !== 11) { newErrors.phone = true; } if (Object.keys(newErrors).length > 0) { setContactErrors(newErrors); return; } setContactsList(contactsList.map(c => c.id === contactToEdit.id ? { ...c, name: n, phone: p } : c)); setTransactionsList(prev => prev.map(t => t.contactId === contactToEdit.id ? { ...t, contactName: n } : t)); setIsEditContactModalOpen(false); setContactErrors({}); }} className="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold uppercase shadow-lg text-xs tracking-widest active:scale-95 transition-all" > Update Details </button> </div> </div>)}
                    {showSuccessAnimation && <SuccessAnimation />}
                </div>
            );
        }

        const App = () => {
            return <AppContent />;
        };

        const rootInstance = ReactDOM.createRoot(document.getElementById('root'));
        rootInstance.render(<App />);
    </script>
</body>

</html>
