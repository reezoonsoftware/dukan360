<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dukan360</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
            /* Lock body scrolling completely */
            overscroll-behavior-y: none;
            /* Prevent bounce effect on mobile */
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Card Animations */
        .card-carousel-container {
            scroll-snap-type: x mandatory;
            display: flex;
            overflow-x: auto;
            gap: 1rem;
            padding: 10px;
        }

        .v-card-item {
            scroll-snap-align: center;
            flex: 0 0 100%;
        }

        #printable-invoice {
            background: white;
            padding: 10px;
            margin: 0 auto;
        }

        .scanner-container {
            width: 100%;
            height: 100%;
            background: #000;
            position: relative;
            overflow: hidden;
        }

        .scanner-container video {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }

        /* Print Specific Styles */
        @media print {
            body, html {
                background: white !important;
                height: auto !important;
            }
            #root > div {
                height: auto !important;
                overflow: visible !important;
                border: none !important;
                box-shadow: none !important;
                max-width: none !important;
            }
            #root > div > * {
                display: none !important;
            }
            #root > div > .print-modal {
                display: block !important;
                position: absolute !important;
                left: 0 !important;
                top: 0 !important;
                width: 100% !important;
                padding: 0 !important;
                background: white !important;
                backdrop-filter: none !important;
            }
            .print-modal > div {
                border-radius: 0 !important;
                box-shadow: none !important;
                margin: 0 !important;
                padding: 0 !important;
                border: none !important;
            }
            .print-hide {
                display: none !important;
            }
            .print-scroll-fix {
                overflow: visible !important;
                max-height: none !important;
                background: white !important;
                padding: 0 !important;
            }
            #printable-invoice {
                margin: 0 auto !important;
                box-shadow: none !important;
                padding-top: 0 !important;
            }
        }
    </style>
</head>

<body class="bg-slate-50 overflow-hidden h-screen w-screen">
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        // --- GLOBAL AUDIO CONTEXT ---
        let globalAudioCtx = null;
        const getAudioContext = () => {
            if (!globalAudioCtx) {
                globalAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (globalAudioCtx.state === 'suspended') {
                globalAudioCtx.resume();
            }
            return globalAudioCtx;
        };

        // --- UTILITIES & HOOKS ---
        const useLocalStorage = (key, initialValue) => {
            const namespacedKey = `guest_${key}`; // Maintain compatibility with offline data

            const [state, setState] = useState(() => {
                try {
                    const saved = localStorage.getItem(namespacedKey);
                    return saved ? JSON.parse(saved) : initialValue;
                } catch (e) { return initialValue; }
            });

            const setLocalState = useCallback((newValue) => {
                setState(prev => {
                    const updated = typeof newValue === 'function' ? newValue(prev) : newValue;
                    localStorage.setItem(namespacedKey, JSON.stringify(updated));
                    return updated;
                });
            }, [namespacedKey]);

            return [state, setLocalState];
        };

        const formatAmount = (num) => {
            const parsed = parseFloat(num);
            return isNaN(parsed) ? "0" : Math.round(parsed).toString();
        };

        const formatPhoneForWA = (phone) => {
            if (!phone) return "";
            let cleaned = phone.replace(/\D/g, '');
            if (cleaned.startsWith('0')) cleaned = cleaned.substring(1);
            if (!cleaned.startsWith('92')) cleaned = '92' + cleaned;
            return cleaned;
        };

        const getIsoDate = (date = new Date()) => date.toISOString().split('T')[0];

        const isNearExpiry = (expiryDate) => {
            if (!expiryDate) return false;
            const exp = new Date(expiryDate);
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const diffTime = exp - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            return diffDays >= 0 && diffDays <= 15;
        };

        const playBeep = () => {
            try {
                const context = getAudioContext();
                const oscillator = context.createOscillator();
                const gainNode = context.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(context.destination);

                // Real Scanner Sound: Square wave for that sharp digital "beep"
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(2200, context.currentTime); // 2200Hz is a classic scanner pitch

                const now = context.currentTime;
                // Crisp attack and release (short duration)
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(0.1, now + 0.005); // Very fast attack
                gainNode.gain.linearRampToValueAtTime(0, now + 0.08); // 80ms duration

                oscillator.start(now);
                oscillator.stop(now + 0.1);
            } catch (e) { console.warn("Audio issue:", e); }
        };

        const playClickSound = () => {
            try {
                const context = getAudioContext();
                const oscillator = context.createOscillator();
                const gainNode = context.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(context.destination);
                oscillator.type = 'sine';
                oscillator.frequency.value = 1200;
                const now = context.currentTime;
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(0.4, now + 0.005);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.06);
                oscillator.start(now);
                oscillator.stop(now + 0.07);
            } catch (e) { console.warn("Audio issue:", e); }
        };

        const Icon = ({ name, size = 18, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    const iconName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                    iconRef.current.innerHTML = `<i data-lucide="${iconName}" style="width: ${size}px; height: ${size}px;" class="${className}"></i>`;
                    window.lucide.createIcons();
                }
            }, [name, size, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        const compressImage = (base64Str, maxWidth = 400) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = base64Str;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const scaleSize = maxWidth / img.width;
                    canvas.width = maxWidth;
                    canvas.height = img.height * scaleSize;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    resolve(canvas.toDataURL('image/jpeg', 0.7));
                };
            });
        };

        // --- BUSINESS CARD COMPONENT ---
        const VisitingCard = ({ id, templateIndex, shopName, ownerName, shopPhone, shopAddress, shopLogo }) => {
            const templates = [
                "bg-white border-slate-200 text-slate-800", // 1. Minimalist
                "bg-slate-900 text-white border-slate-700", // 2. Professional Dark
            ];
            templates.push(
                "bg-gradient-to-br from-blue-600 to-indigo-800 text-white border-blue-400", // 3. Blue Gradient
                "bg-gradient-to-r from-emerald-500 to-teal-700 text-white border-emerald-400", // 4. Emerald
                "bg-gradient-to-br from-amber-400 to-orange-600 text-white border-amber-300", // 5. Sunset Orange
                "bg-gradient-to-r from-rose-500 to-red-700 text-white border-rose-400", // 6. Red Power
                "bg-slate-50 border-blue-500 border-l-[12px] text-slate-800", // 7. Corporate Stripe
                "bg-gradient-to-br from-purple-600 to-fuchsia-700 text-white border-purple-400", // 8. Modern Purple
                "bg-gradient-to-br from-slate-700 to-slate-900 text-amber-400 border-amber-500", // 9. Luxury Gold/Dark
                "bg-white border-green-600 border-t-8 text-slate-800" // 10. Nature White
            );

            const currentStyle = templates[templateIndex] || templates[0];

            return (
                <div id={id} className={`w-full aspect-[1.75/1] rounded-3xl border shadow-xl p-6 flex flex-col justify-between relative overflow-hidden transition-all duration-500 ${currentStyle}`}>
                    {templateIndex >= 2 && <div className="absolute -top-10 -right-10 w-32 h-32 bg-white/10 rounded-full blur-2xl"></div>}
                    {templateIndex >= 2 && <div className="absolute -bottom-10 -left-10 w-40 h-40 bg-black/10 rounded-full blur-2xl"></div>}

                    <div className="flex justify-between items-start relative z-10">
                        <div className="flex-1 pr-4">
                            <h3 className="text-xl font-black uppercase tracking-tight leading-none break-words mb-1">{shopName || "Apki Dukan"}</h3>
                            <p className="text-[10px] font-bold opacity-80 uppercase tracking-widest">{ownerName || "Owner Name"}</p>
                        </div>
                        <div className="shrink-0">
                            <div className="w-14 h-14 bg-white/20 backdrop-blur-md rounded-2xl flex items-center justify-center border border-white/30 overflow-hidden shadow-lg">
                                {shopLogo ? <img src={shopLogo} className="w-full h-full object-cover" /> : <Icon name="Store" size={28} />}
                            </div>
                        </div>
                    </div>

                    <div className="space-y-1.5 relative z-10">
                        <div className="flex items-center gap-2 opacity-90">
                            <Icon name="Phone" size={12} />
                            <span className="text-xs font-bold tracking-wider">{shopPhone || "03XX-XXXXXXX"}</span>
                        </div>
                        <div className="flex items-start gap-2 opacity-90">
                            <Icon name="MapPin" size={12} className="mt-0.5 shrink-0" />
                            <span className="text-[10px] font-medium leading-tight break-words">{shopAddress || "Store Address, City Name"}</span>
                        </div>
                        <div className="pt-2 flex justify-between items-center border-t border-current/20 mt-1">
                            <span className="text-[8px] font-black uppercase tracking-[0.3em] opacity-60">Digital Business Card</span>
                            <div className="flex items-center gap-1">
                                <span className="text-[7px] font-bold opacity-50 uppercase">Powered by</span>
                                <span className="text-[8px] font-black tracking-tighter italic">Dukan360</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const BusinessCardCarousel = ({ shopName, ownerName, shopPhone, shopAddress, shopLogo, currentIndex, setCurrentIndex }) => {
            // Internal state removed, now using props for persistence
            const [isSharing, setIsSharing] = useState(false);
            const cardRefPrefix = "v-card-ref-";

            const shareCard = async () => {
                const element = document.getElementById(`${cardRefPrefix}${currentIndex}`);
                if (!element) return;
                setIsSharing(true);
                try {
                    const canvas = await html2canvas(element, {
                        scale: 3,
                        useCORS: true,
                        backgroundColor: null,
                        borderRadius: 24
                    });

                    canvas.toBlob(async (blob) => {
                        const file = new File([blob], `BusinessCard-${shopName}.png`, { type: 'image/png' });
                        if (navigator.canShare && navigator.canShare({ files: [file] })) {
                            try {
                                await navigator.share({
                                    title: `${shopName} Business Card`,
                                    text: `Check out my business card!`,
                                    files: [file]
                                });
                            } catch (err) { console.warn("Share failed", err); }
                        } else {
                            const a = document.createElement('a');
                            a.href = URL.createObjectURL(blob);
                            a.download = `BusinessCard-${shopName}.png`;
                            a.click();
                        }
                        setIsSharing(false);
                    });
                } catch (e) {
                    console.error("Card capture failed", e);
                    setIsSharing(false);
                }
            };

            const next = () => setCurrentIndex((prev) => (prev + 1) % 10);
            const prev = () => setCurrentIndex((prev) => (prev - 1 + 10) % 10);

            return (
                <div className="space-y-4">
                    <div className="relative group">
                        <VisitingCard
                            id={`${cardRefPrefix}${currentIndex}`}
                            templateIndex={currentIndex}
                            shopName={shopName}
                            ownerName={ownerName}
                            shopPhone={shopPhone}
                            shopAddress={shopAddress}
                            shopLogo={shopLogo}
                        />

                        <div className="absolute inset-y-0 -left-2 -right-2 flex justify-between items-center pointer-events-none">
                            <button onClick={prev} className="w-8 h-8 bg-white/90 backdrop-blur rounded-full shadow-lg flex items-center justify-center text-slate-800 pointer-events-auto active:scale-90 border transition-all">
                                <Icon name="ChevronLeft" size={20} />
                            </button>
                            <button onClick={next} className="w-8 h-8 bg-white/90 backdrop-blur rounded-full shadow-lg flex items-center justify-center text-slate-800 pointer-events-auto active:scale-90 border transition-all">
                                <Icon name="ChevronRight" size={20} />
                            </button>
                        </div>
                    </div>

                    <div className="flex justify-between items-center px-2">
                        <div className="flex gap-1">
                            {[...Array(10)].map((_, i) => (
                                <div key={i} className={`h-1.5 rounded-full transition-all duration-300 ${currentIndex === i ? 'w-4 bg-blue-600' : 'w-1.5 bg-slate-300'}`}></div>
                            ))}
                        </div>
                        <button
                            onClick={shareCard}
                            disabled={isSharing}
                            className={`flex items-center gap-2 px-6 py-2 rounded-xl text-xs font-black uppercase tracking-widest transition-all active:scale-95 shadow-lg border-b-4 ${isSharing ? 'bg-slate-300 border-slate-400' : 'bg-emerald-600 border-emerald-800 text-white'}`}
                        >
                            <Icon name={isSharing ? "Loader2" : "Share2"} size={16} className={isSharing ? "animate-spin" : ""} />
                            {isSharing ? 'Processing' : 'Share Card'}
                        </button>
                    </div>
                    <p className="text-[9px] text-center text-slate-400 font-bold uppercase tracking-widest italic">Swipe left/right to change design</p>
                </div>
            );
        };

        // --- WHATSAPP HELPER ---
        const sendWAInvoice = (tx, shopName, shopPhone, shopAddress, phoneNumber) => {
            if (!phoneNumber) return;
            const cleanedNum = formatPhoneForWA(phoneNumber);

            const itemsString = tx.items.map((item, idx) =>
                `${idx + 1}. *${item.name}*\n   ${item.quantity} x ${formatAmount(item.priceUsed)} = Rs.${formatAmount(item.quantity * item.priceUsed)}`
            ).join('\n\n');

            const subtotalLine = tx.discountAmount > 0 ? `Subtotal: Rs.${formatAmount(tx.subtotal)}\n` : '';
            const discountLine = tx.discountAmount > 0 ? `Discount: -Rs.${formatAmount(tx.discountAmount)}\n` : '';

            const netAmount = tx.amount;
            const paidAmount = tx.paidAmount || 0;
            const balanceAmount = netAmount - paidAmount;

            let paymentTafseel = '';
            if (paidAmount < netAmount) {
                paymentTafseel = `--------------------------------\nPaid: Rs.${formatAmount(paidAmount)}\n*Remaining: Rs.${formatAmount(balanceAmount)}*\n`;
            } else if (tx.paymentType === 'Cash') {
                paymentTafseel = `Status: *Full Paid (Cash)*\n`;
            }

            const addressLine = shopAddress ? `📍 ${shopAddress}\n` : '';
            const phoneLine = shopPhone ? `📞 ${shopPhone}\n` : '';

            const rawMsg = `*${shopName.toUpperCase()}*\n${addressLine}${phoneLine}--------------------------------\n*INVOICE DETAILS*\n--------------------------------\n*Inv No:* ${tx.id}\n*Date:* ${tx.date} | ${tx.time}\n*Customer:* ${tx.contactName}\n--------------------------------\n${itemsString}\n--------------------------------\n${subtotalLine}${discountLine}*TOTAL BILL: Rs.${formatAmount(netAmount)}*\n${paymentTafseel}--------------------------------\n_Shukriya! Phir zaroor aayein._\n\n_Powered by Dukan360_`;

            const encodedMsg = encodeURIComponent(rawMsg);
            window.open(`https://wa.me/${cleanedNum}?text=${encodedMsg}`, '_blank');
        };

        const shareInvoiceAsImage = async (tx, shopName) => {
            const element = document.getElementById('printable-invoice');
            if (!element) return;
            try {
                const canvas = await html2canvas(element, { scale: 2, backgroundColor: '#ffffff' });
                canvas.toBlob(async (blob) => {
                    const file = new File([blob], `Invoice-${tx.id}.png`, { type: 'image/png' });
                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        try {
                            await navigator.share({
                                title: `${shopName} Invoice`,
                                text: `Invoice #${tx.id} from ${shopName}`,
                                files: [file]
                            });
                        } catch (err) { console.warn("Share failed", err); }
                    } else {
                        const a = document.createElement('a');
                        a.href = URL.createObjectURL(blob);
                        a.download = `Invoice-${tx.id}.png`;
                        a.click();
                    }
                });
            } catch (e) {
                console.error("Image generation failed", e);
            }
        };

        const generatePDFStatement = (contact, transactions, shopName) => {
            if (!window.jspdf) return alert("PDF generator not loaded");
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            doc.setFontSize(18);
            doc.text(shopName || "Business Statement", 14, 15);
            doc.setFontSize(10);
            doc.text(`Contact: ${contact.name} (${contact.phone})`, 14, 22);
            doc.text(`Date: ${getIsoDate()}`, 14, 27);

            const rows = transactions.map(t => [
                `${t.date}\n${t.time}`,
                t.type.toUpperCase(),
                t.description || (t.items ? `${t.items.length} Items` : '-'),
                (t.type === 'sale' || t.type === 'payment') ? formatAmount(t.amount) : '-',
                (t.type === 'purchase' || t.type === 'receipt') ? formatAmount(t.amount) : '-',
            ]);

            doc.autoTable({
                startY: 32,
                head: [['Date', 'Type', 'Description', 'Debit (Dr)', 'Credit (Cr)']],
                body: rows,
                theme: 'grid',
                styles: { fontSize: 8 },
                headStyles: { fillColor: [22, 163, 74] }
            });

            const finalY = doc.lastAutoTable.finalY + 10;
            doc.setFontSize(12);
            doc.text(`Net Balance: Rs. ${formatAmount(contact.balance)} ${contact.balance < 0 ? '(Receivable)' : '(Payable)'}`, 14, finalY);

            doc.save(`${contact.name}_Statement.pdf`);
        };

        // --- SUB-COMPONENTS ---

        const PerformanceSection = ({ transactions, products, categories, isRomanUrdu, onBack }) => {
            const [pFilter, setPFilter] = useState('all');
            const [pCustomStart, setPCustomStart] = useState(getIsoDate());
            const [pCustomEnd, setPCustomEnd] = useState(getIsoDate());

            const [showAllSelling, setShowAllSelling] = useState(false);
            const [showAllProfitable, setShowAllProfitable] = useState(false);

            const stats = useMemo(() => {
                const today = getIsoDate();
                const yesterdayObj = new Date(); yesterdayObj.setDate(yesterdayObj.getDate() - 1);
                const yesterday = getIsoDate(yesterdayObj);
                const currentMonth = today.substring(0, 7);

                const lastMonthObj = new Date(); lastMonthObj.setMonth(lastMonthObj.getMonth() - 1);
                const lastMonth = lastMonthObj.toISOString().substring(0, 7);
                const currentYear = today.substring(0, 4);

                const filteredTransactions = transactions.filter(t => {
                    if (pFilter === 'today') return t.date === today;
                    if (pFilter === 'yesterday') return t.date === yesterday;
                    if (pFilter === 'thisMonth') return t.date.startsWith(currentMonth);
                    if (pFilter === 'lastMonth') return t.date.startsWith(lastMonth);
                    if (pFilter === 'thisYear') return t.date.startsWith(currentYear);
                    if (pFilter === 'custom') return t.date >= pCustomStart && t.date <= pCustomEnd;
                    return true;
                });

                const sales = filteredTransactions.filter(t => t.type === 'sale');
                const saleReturns = filteredTransactions.filter(t => t.type === 'sale_return');
                const productMap = {};
                const categoryMap = {};

                products.forEach(p => {
                    productMap[p.id] = {
                        name: p.name,
                        totalQty: 0,
                        totalRevenue: 0,
                        totalProfit: 0,
                        categoryId: p.categoryId,
                        image: p.image
                    };
                });

                categories.forEach(c => {
                    categoryMap[c.id] = { name: c.name, totalRevenue: 0, totalProfit: 0 };
                });
                categoryMap['all'] = { name: 'General', totalRevenue: 0, totalProfit: 0 };

                sales.forEach(tx => {
                    (tx.items || []).forEach(item => {
                        if (productMap[item.id]) {
                            const qty = parseFloat(item.quantity) || 0;
                            const rev = (parseFloat(item.priceUsed) || 0) * qty;
                            const cost = (parseFloat(item.costUsedForProfit) || 0) * qty;
                            const prof = rev - cost;

                            productMap[item.id].totalQty += qty;
                            productMap[item.id].totalRevenue += rev;
                            productMap[item.id].totalProfit += prof;

                            const catId = productMap[item.id].categoryId || 'all';
                            if (categoryMap[catId]) {
                                categoryMap[catId].totalRevenue += rev;
                                categoryMap[catId].totalProfit += prof;
                            }
                        }
                    });
                });

                saleReturns.forEach(tx => {
                    (tx.items || []).forEach(item => {
                        if (productMap[item.id]) {
                            const qty = parseFloat(item.quantity) || 0;
                            const rev = (parseFloat(item.priceUsed) || 0) * qty;
                            const cost = (parseFloat(item.costUsedForProfit) || 0) * qty;
                            const prof = rev - cost;

                            productMap[item.id].totalQty -= qty;
                            productMap[item.id].totalRevenue -= rev;
                            productMap[item.id].totalProfit -= prof;

                            const catId = productMap[item.id].categoryId || 'all';
                            if (categoryMap[catId]) {
                                categoryMap[catId].totalRevenue -= rev;
                                categoryMap[catId].totalProfit -= prof;
                            }
                        }
                    });
                });

                const productList = Object.values(productMap);
                const categoryList = Object.values(categoryMap).filter(c => c.totalRevenue > 0);

                return {
                    topSelling: [...productList].sort((a, b) => b.totalQty - a.totalQty).filter(i => i.totalRevenue > 0),
                    topProfitable: [...productList].sort((a, b) => b.totalProfit - a.totalProfit).filter(i => i.totalRevenue > 0),
                    bestCategories: [...categoryList].sort((a, b) => b.totalRevenue - a.totalRevenue),
                    totalRev: productList.reduce((a, b) => a + b.totalRevenue, 0),
                    totalProf: productList.reduce((a, b) => a + b.totalProfit, 0)
                };
            }, [transactions, products, categories, pFilter, pCustomStart, pCustomEnd]);

            const StatCard = ({ title, items, colorClass, romanUrdu, showAll, onToggle }) => {
                const displayedItems = showAll ? items : items.slice(0, 3);

                return (
                    <div className="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden flex flex-col mb-4 transition-all duration-300">
                        <div className={`p-4 ${colorClass} text-white flex justify-between items-center`}>
                            <div className="flex-1">
                                <h4 className="font-black text-xs uppercase tracking-widest">{title}</h4>
                                {isRomanUrdu && <p className="text-[10px] opacity-80 font-bold uppercase tracking-tight">{romanUrdu}</p>}
                            </div>
                            {items.length > 3 && (
                                <button
                                    onClick={onToggle}
                                    className="bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all active:scale-90"
                                >
                                    {showAll ? 'Show Less' : 'See All'}
                                </button>
                            )}
                        </div>
                        <div className="p-2 divide-y divide-slate-50">
                            {displayedItems.map((item, idx) => (
                                <div key={idx} className="p-3 flex items-center justify-between gap-3 animate-in fade-in slide-in-from-right duration-300">
                                    <div className="flex items-center gap-3 min-w-0">
                                        <span className="text-[10px] font-black text-slate-300 w-4">#{idx + 1}</span>
                                        <div className="w-8 h-8 rounded-lg bg-slate-50 flex items-center justify-center shrink-0 overflow-hidden">
                                            {item.image ? <img src={item.image} className="w-full h-full object-cover" /> : <Icon name="Package" size={14} className="text-slate-300" />}
                                        </div>
                                        <div className="min-w-0">
                                            <p className="text-xs font-bold text-slate-700 truncate">{item.name}</p>
                                            <p className="text-[9px] font-black text-slate-400 uppercase tracking-tighter">Qty: {Math.round(item.totalQty)} Sold</p>
                                        </div>
                                    </div>
                                    <div className="text-right shrink-0">
                                        <p className="text-[10px] font-black text-slate-900 leading-tight">Sale: Rs.{formatAmount(item.totalRevenue)}</p>
                                        <p className="text-[10px] font-black text-green-600 leading-tight">Profit: Rs.{formatAmount(item.totalProfit)}</p>
                                    </div>
                                </div>
                            ))}
                            {items.length === 0 && <p className="p-10 text-center text-[10px] font-bold text-slate-300 uppercase tracking-widest">No Sales in Selected Period</p>}
                        </div>
                        {items.length > 3 && !showAll && (
                            <button
                                onClick={onToggle}
                                className="p-3 text-center text-[9px] font-black uppercase tracking-[0.2em] text-slate-400 hover:bg-slate-50 border-t"
                            >
                                + {items.length - 3} More Items / Mazeed Dekhein
                            </button>
                        )}
                    </div>
                );
            };

            return (
                <div className="flex flex-col bg-slate-50 pb-32">
                    <div className="p-4 bg-white border-b flex flex-col gap-4">
                        <div className="flex justify-between items-center">
                            <div className="flex items-center gap-4">
                                <button onClick={onBack} className="p-2 bg-slate-50 rounded-full active:scale-90 border shadow-sm"><Icon name="ArrowLeft" /></button>
                                <div>
                                    <h3 className="text-lg font-black text-slate-800 uppercase tracking-tight">Performance Hub</h3>
                                    <p className="text-[10px] font-bold text-blue-600 uppercase tracking-widest">Full Product Analytics</p>
                                </div>
                            </div>
                        </div>

                        <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                            {[
                                { id: 'all', label: 'All Time' },
                                { id: 'today', label: 'Today' },
                                { id: 'yesterday', label: 'Yesterday' },
                                { id: 'thisMonth', label: 'This Month' },
                                { id: 'lastMonth', label: 'Last Month' },
                                { id: 'thisYear', label: 'This Year' },
                                { id: 'custom', label: 'Custom' }
                            ].map(f => (
                                <button
                                    key={f.id}
                                    onClick={() => { setPFilter(f.id); setShowAllSelling(false); setShowAllProfitable(false); }}
                                    className={`px-4 py-2 rounded-full text-[10px] font-black uppercase border transition-all whitespace-nowrap ${pFilter === f.id ? 'bg-blue-600 text-white border-blue-600 shadow-md' : 'bg-slate-100 text-slate-500 border-slate-200'}`}
                                >
                                    {f.label}
                                </button>
                            ))}
                        </div>

                        {pFilter === 'custom' && (
                            <div className="grid grid-cols-2 gap-2 bg-blue-50 p-3 rounded-2xl border border-blue-100 animate-in slide-in-from-top duration-300">
                                <div>
                                    <label className="text-[8px] font-black text-blue-400 uppercase ml-1">From</label>
                                    <input type="date" value={pCustomStart} onChange={(e) => setPCustomStart(e.target.value)} className="w-full bg-white border border-blue-100 p-2 rounded-xl text-xs font-bold text-slate-700 outline-none" />
                                </div>
                                <div>
                                    <label className="text-[8px] font-black text-blue-400 uppercase ml-1">To</label>
                                    <input type="date" value={pCustomEnd} onChange={(e) => setPCustomEnd(e.target.value)} className="w-full bg-white border border-blue-100 p-2 rounded-xl text-xs font-bold text-slate-700 outline-none" />
                                </div>
                            </div>
                        )}
                    </div>

                    <div className="p-4 space-y-2 no-scrollbar">
                        <StatCard
                            title="Most Selling Items"
                            items={stats.topSelling}
                            colorClass="bg-blue-600"
                            romanUrdu="Sab se zyada biknay wala maal"
                            showAll={showAllSelling}
                            onToggle={() => setShowAllSelling(!showAllSelling)}
                        />

                        <StatCard
                            title="Most Profitable Items"
                            items={stats.topProfitable}
                            colorClass="bg-emerald-600"
                            romanUrdu="Sab se zyada munafa denay wala maal"
                            showAll={showAllProfitable}
                            onToggle={() => setShowAllProfitable(!showAllProfitable)}
                        />

                        <div className="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden mb-4">
                            <div className="p-4 bg-orange-500 text-white">
                                <h4 className="font-black text-xs uppercase tracking-widest">Categories Performance</h4>
                                {isRomanUrdu && <p className="text-[10px] opacity-80 font-bold uppercase tracking-tight">Categories ka hisaab kitab</p>}
                            </div>
                            <div className="p-2 divide-y divide-slate-50">
                                {stats.bestCategories.map((cat, idx) => (
                                    <div key={idx} className="p-4 space-y-3">
                                        <div className="flex justify-between items-start">
                                            <div className="min-w-0 pr-4">
                                                <p className="text-xs font-black text-slate-800 uppercase tracking-tight truncate">{cat.name}</p>
                                                <div className="flex gap-4 mt-1">
                                                    <p className="text-[10px] font-bold text-slate-500 uppercase">Sale: <span className="text-slate-900">Rs.{formatAmount(cat.totalRevenue)}</span></p>
                                                    <p className="text-[10px] font-bold text-slate-500 uppercase">Profit: <span className="text-green-600">Rs.{formatAmount(cat.totalProfit)}</span></p>
                                                </div>
                                            </div>
                                            <div className="text-right">
                                                <p className="text-[9px] font-black text-orange-500 uppercase tracking-widest">{((cat.totalRevenue / (stats.totalRev || 1)) * 100).toFixed(1)}%</p>
                                                <p className="text-[8px] font-bold text-slate-300 uppercase leading-none">Share</p>
                                            </div>
                                        </div>
                                        <div className="h-1.5 bg-slate-50 rounded-full overflow-hidden border border-slate-100">
                                            <div
                                                className="h-full bg-orange-400 rounded-full transition-all duration-1000"
                                                style={{ width: `${(cat.totalRevenue / (stats.totalRev || 1)) * 100}%` }}
                                            ></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="p-10 text-center opacity-30">
                            <Icon name="Trophy" size={48} className="mx-auto mb-2" />
                            <p className="text-[10px] font-black uppercase tracking-[0.3em]">End of Performance Report</p>
                        </div>
                    </div>
                </div>
            );
        };

        const CategoryManagerModal = ({ categories, setCategories, onClose }) => {
            const [newCat, setNewCat] = useState("");
            const [editingId, setEditingId] = useState(null);
            const [editName, setEditName] = useState("");

            const handleAdd = () => {
                if (!newCat.trim()) return;
                setCategories([...categories, { id: String(Date.now()), name: newCat.trim() }]);
                setNewCat("");
            };

            const handleDelete = (id) => {
                if (window.confirm("Yeh category delete karne se products delete nahi honge magar unka filter hat jayega. Delete karein?")) {
                    setCategories(categories.filter(c => c.id !== id));
                }
            };

            const startEdit = (cat) => {
                setEditingId(cat.id);
                setEditName(cat.name);
            };

            const saveEdit = () => {
                if (!editName.trim()) return;
                setCategories(categories.map(c => c.id === editingId ? { ...c, name: editName.trim() } : c));
                setEditingId(null);
            };

            return (
                <div className="fixed inset-0 z-[600] bg-black/80 backdrop-blur-md flex items-center justify-center p-4">
                    <div className="bg-white w-full max-sm rounded-3xl overflow-hidden flex flex-col max-h-[80vh] shadow-2xl animate-in zoom-in duration-300 text-left">
                        <div className="p-4 bg-slate-50 border-b flex justify-between items-center shrink-0">
                            <h3 className="font-bold text-slate-800 text-sm">Categories Sambhalein</h3>
                            <button onClick={onClose} className="p-2 bg-white rounded-full shadow-sm active:scale-90"><Icon name="X" /></button>
                        </div>
                        <div className="p-4 border-b shrink-0">
                            <div className="flex gap-2">
                                <input
                                    type="text"
                                    value={newCat || ""}
                                    onChange={(e) => setNewCat(e.target.value)}
                                    placeholder="Nayi Category ka Naam..."
                                    className="flex-1 bg-slate-50 border p-3 rounded-xl outline-none text-sm font-bold"
                                />
                                <button onClick={handleAdd} className="bg-blue-600 text-white px-4 rounded-xl active:scale-90 shadow-md">
                                    <Icon name="Plus" />
                                </button>
                            </div>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 space-y-2 no-scrollbar">
                            {categories.length === 0 ? (
                                <p className="text-center text-slate-400 text-xs font-bold py-10 uppercase tracking-widest">Koi category nahi mili</p>
                            ) : (
                                categories.map(c => (
                                    <div key={c.id} className="bg-slate-50 p-3 rounded-xl border border-slate-100 flex items-center justify-between">
                                        {editingId === c.id ? (
                                            <div className="flex-1 flex gap-2">
                                                <input value={editName || ""} onChange={(e) => setEditName(e.target.value)} className="flex-1 bg-white border p-1 rounded px-2 text-sm font-bold outline-blue-400" />
                                                <button onClick={saveEdit} className="text-green-600"><Icon name="Check" /></button>
                                                <button onClick={() => setEditingId(null)} className="text-slate-400"><Icon name="X" /></button>
                                            </div>
                                        ) : (
                                            <>
                                                <span className="font-bold text-slate-700 text-sm">{c.name}</span>
                                                <div className="flex gap-2">
                                                    <button onClick={() => startEdit(c)} className="text-blue-400 p-1 active:scale-90"><Icon name="Pencil" size={14} /></button>
                                                    <button onClick={() => handleDelete(c.id)} className="text-red-400 p-1 active:scale-90"><Icon name="Trash2" size={14} /></button>
                                                </div>
                                            </>
                                        )}
                                    </div>
                                ))
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const HighSpeedScannerPopup = ({ onScan, onClose, scannerId, cart = [], cartTotal = 0, showCheckout = false }) => {
            const scannerInstance = useRef(null);
            const lastCode = useRef("");
            const lockTime = useRef(0);
            const [flash, setFlash] = useState(false);
            const [torchOn, setTorchOn] = useState(false);
            const [errorMessage, setErrorMessage] = useState(null);

            // FIX: Use ref for onScan to prevent scanner restart on every scan (keeping torch alive)
            const onScanRef = useRef(onScan);
            useEffect(() => { onScanRef.current = onScan; }, [onScan]);

            const handleScanResult = useCallback((text) => {
                const now = Date.now();
                if (text === lastCode.current && now < lockTime.current) return;
                lastCode.current = text; lockTime.current = now + 800; // Lock time
                setFlash(true); setTimeout(() => setFlash(false), 300);
                playBeep();
                if (onScanRef.current) onScanRef.current(text);
            }, []);

            useEffect(() => {
                const html5QrCode = new window.Html5Qrcode(scannerId);
                scannerInstance.current = html5QrCode;
                const start = async () => {
                    try {
                        const config = {
                            fps: 60,
                            // Full screen scanning logic
                            qrbox: (viewfinderWidth, viewfinderHeight) => {
                                return {
                                    width: viewfinderWidth * 0.95, // Scan 95% of width
                                    height: viewfinderHeight * 0.95 // Scan 95% of height
                                };
                            },
                            aspectRatio: undefined,
                            disableFlip: false,
                            videoConstraints: {
                                focusMode: "continuous", // Try to force auto-focus
                                facingMode: "environment"
                            }
                        };
                        try { await html5QrCode.start({ facingMode: "environment" }, config, handleScanResult); }
                        catch (err) { await html5QrCode.start({ facingMode: "user" }, config, handleScanResult); }
                    } catch (err) { setErrorMessage("Camera access failed."); }
                };
                start();
                return () => { if (scannerInstance.current && scannerInstance.current.isScanning) { scannerInstance.current.stop().catch(e => console.log(e)); } };
            }, [scannerId, handleScanResult]);

            const toggleTorch = () => {
                if (scannerInstance.current) {
                    const newMode = !torchOn;
                    scannerInstance.current.applyVideoConstraints({
                        advanced: [{ torch: newMode }]
                    })
                        .then(() => setTorchOn(newMode))
                        .catch(err => {
                            console.warn("Torch toggle failed", err);
                            alert("Torch control not supported on this device/browser.");
                        });
                }
            };

            return (
                <div className="fixed inset-0 z-[400] bg-black flex items-center justify-center animate-in fade-in duration-300">
                    <div className={`bg-black w-full h-full flex flex-col relative`}>
                        {/* Top Controls Overlay - Minimal transparent gradient */}
                        <div className="absolute top-0 left-0 right-0 p-4 flex justify-between items-center z-20 bg-gradient-to-b from-black/40 to-transparent">
                            <div className="flex items-center gap-2">
                                <button onClick={onClose} className="p-2 bg-white/10 backdrop-blur-md rounded-full text-white active:scale-90 border border-white/20 shadow-sm"><Icon name="ArrowLeft" size={24} /></button>
                            </div>
                            <button onClick={toggleTorch} className={`p-3 rounded-full backdrop-blur-md border active:scale-90 transition-all ${torchOn ? 'bg-amber-500 text-white border-amber-400 shadow-[0_0_15px_rgba(245,158,11,0.5)]' : 'bg-white/10 text-white border-white/20'}`}>
                                <Icon name={torchOn ? "Zap" : "ZapOff"} size={20} />
                            </button>
                        </div>

                        {/* Main Camera View */}
                        <div className={`relative flex-1 bg-black overflow-hidden ${flash ? 'scan-success-flash' : ''}`}>
                            {errorMessage ? (
                                <div className="absolute inset-0 flex flex-col items-center justify-center text-center p-8 z-30">
                                    <Icon name="CameraOff" size={48} className="text-slate-500 mb-4" />
                                    <p className="text-slate-400 text-xs font-bold leading-relaxed">{errorMessage}</p>
                                </div>
                            ) : (
                                <div id={scannerId} className="scanner-container w-full h-full absolute inset-0"></div>
                            )}

                            {/* Minimal UI Overlay - No dark background, just guidance */}
                            {!errorMessage && (
                                <div className="absolute inset-0 pointer-events-none flex flex-col items-center justify-center">
                                    {/* Center Focus Guide (Optional, minimal corners) */}
                                    <div className="w-64 h-48 relative opacity-50">
                                        <div className="absolute top-0 left-0 w-6 h-6 border-t-2 border-l-2 border-white rounded-tl-lg"></div>
                                        <div className="absolute top-0 right-0 w-6 h-6 border-t-2 border-r-2 border-white rounded-tr-lg"></div>
                                        <div className="absolute bottom-0 left-0 w-6 h-6 border-b-2 border-l-2 border-white rounded-bl-lg"></div>
                                        <div className="absolute bottom-0 right-0 w-6 h-6 border-b-2 border-r-2 border-white rounded-br-lg"></div>

                                        {/* Laser Line - Red line to show active scanning */}
                                        <div className="absolute top-1/2 left-4 right-4 h-0.5 bg-red-500/80 shadow-[0_0_8px_rgba(239,68,68,0.8)] animate-pulse"></div>
                                    </div>

                                    <div className="absolute bottom-12 text-white/70 text-[10px] font-bold uppercase tracking-widest bg-black/20 px-3 py-1 rounded-full backdrop-blur-sm">
                                        Scanning Full Screen
                                    </div>
                                </div>
                            )}

                            {flash && (
                                <div className="absolute inset-0 flex items-center justify-center bg-green-500/20 backdrop-blur-[1px] z-30">
                                    <div className="bg-white/90 p-4 rounded-full shadow-2xl scale-110 transition-transform">
                                        <Icon name="Check" size={40} className="text-green-600" />
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* Bottom Cart View (Checkout Mode Only) */}
                        {showCheckout && (
                            <div className="h-1/3 flex flex-col bg-slate-900 border-t border-slate-800 shrink-0 z-20 shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
                                <div className="px-5 py-3 border-b border-slate-800 bg-slate-900/50 backdrop-blur flex justify-between items-center shrink-0">
                                    <span className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Recently Scanned</span>
                                    <span className="text-[10px] font-bold text-blue-400">{cart.length} Items</span>
                                </div>
                                <div className="flex-1 overflow-y-auto p-4 space-y-2 no-scrollbar p-2">
                                    {cart.length === 0 ? (
                                        <div className="h-full flex flex-col items-center justify-center opacity-30 text-white">
                                            <Icon name="ShoppingCart" size={32} />
                                            <p className="text-[10px] font-bold mt-2 uppercase tracking-widest text-center">Scan items to add</p>
                                        </div>
                                    ) : (
                                        [...cart].reverse().map((item, idx) => (
                                            <div key={`${item.id}-${idx}`} className="bg-slate-800 p-3 rounded-xl border border-slate-700 flex justify-between items-center animate-in slide-in-from-right duration-300">
                                                <div className="flex-1 min-w-0 pr-2">
                                                    <p className="text-xs font-bold text-slate-200 truncate">{item.name}</p>
                                                    <p className="text-[9px] text-slate-500 font-bold uppercase">Qty: {item.quantity} • Rs. {formatAmount(item.priceUsed)}</p>
                                                </div>
                                                <p className="text-xs font-black text-green-400">Rs. {formatAmount(item.priceUsed * item.quantity)}</p>
                                            </div>
                                        ))
                                    )}
                                </div>
                                <div className="p-4 bg-slate-950 text-white shrink-0 flex justify-between items-center">
                                    <div className="flex flex-col">
                                        <p className="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Total Bill</p>
                                        <p className="text-xl font-black text-white">Rs. {formatAmount(cartTotal)}</p>
                                    </div>
                                    <button onClick={onClose} className="px-8 py-3 bg-green-600 hover:bg-green-500 rounded-xl text-xs font-bold uppercase shadow-[0_0_15px_rgba(22,163,74,0.4)] active:scale-95 transition-all">
                                        Done
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const BillPreviewModal = ({ tx, shopName, shopPhone, shopAddress, shopLogo, paymentDetails, paymentQR, billWidth, onClose }) => {
            const [isCapturing, setIsCapturing] = useState(false);
            if (!tx) return null;
            const handleShare = async () => { setIsCapturing(true); await shareInvoiceAsImage(tx, shopName); setIsCapturing(false); };
            const getTypeLabel = (type) => { switch (type) { case 'sale': return 'SALES INVOICE'; case 'purchase': return 'PURCHASE VOUCHER'; case 'receipt': return 'RECOVERY RECEIPT'; case 'payment': return 'PAYMENT VOUCHER'; case 'sale_return': return 'SALE RETURN'; case 'purchase_return': return 'PURCHASE RETURN'; default: return 'TRANSACTION'; } };
            const subtotal = tx.subtotal || tx.amount; const discount = (tx.discountAmount || 0); const netAmount = tx.amount; const paid = tx.paidAmount || 0; const balanceDue = Math.max(0, netAmount - paid);

            const is58mm = billWidth === '58mm';
            const containerStyle = {
                width: is58mm ? '58mm' : '75mm', // Using slightly less than 80mm for safe margins
                padding: '10px',
                margin: '0 auto',
                backgroundColor: 'white',
                fontSize: is58mm ? '10px' : '12px'
            };

            return (
                <div className="fixed inset-0 z-[300] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 print-modal">
                    <div className="bg-white w-full max-sm rounded-3xl overflow-hidden flex flex-col max-h-[90vh] shadow-2xl print-scroll-fix">
                        <div className="p-4 bg-slate-50 border-b flex justify-between items-center print-hide"><h3 className="font-bold text-slate-800 text-sm">Invoice Preview ({billWidth})</h3><button onClick={onClose} className="p-2 bg-white rounded-full shadow-sm active:scale-90"><Icon name="X" /></button></div>
                        <div className="flex-1 overflow-y-auto bg-slate-200 p-4 no-scrollbar text-center print-scroll-fix">
                            <div id="printable-invoice" style={containerStyle} className="font-mono shadow-lg rounded-sm space-y-4">
                                <div className="text-center space-y-1">{shopLogo && <div className="flex justify-center mb-2"><img src={shopLogo} className="h-16 w-16 rounded-full object-cover" /></div>}<h4 className="text-lg font-bold uppercase">{shopName}</h4>{shopAddress && <p className={`text-slate-500 leading-tight ${is58mm ? 'text-[9px]' : 'text-[10px]'}`}>{shopAddress}</p>}{shopPhone && <p className={`text-slate-500 ${is58mm ? 'text-[9px]' : 'text-[10px]'}`}>Contact: {shopPhone}</p>}<div className="mt-3 py-1 bg-slate-100 rounded-lg"><p className="text-[11px] font-black tracking-[0.2em]">{getTypeLabel(tx.type)}</p></div></div>
                                <div className={`flex justify-between ${is58mm ? 'text-[9px]' : 'text-[10px]'}`}><span>INV#: {tx.id}</span><span className="text-right">{tx.date}<br />{tx.time}</span></div>
                                <div className="border-t border-dashed"></div>
                                {tx.items && tx.items.length > 0 && (<><div className="space-y-2">{tx.items.map((item, idx) => (<div key={idx} className="flex justify-between items-start text-left"><div className="flex-1 pr-2"><p className="font-bold">{item.name}</p><p className={`text-slate-500 ${is58mm ? 'text-[9px]' : 'text-[10px]'}`}>{item.quantity} x {formatAmount(item.priceUsed)}</p></div><p className="font-bold">Rs. {formatAmount(item.quantity * item.priceUsed)}</p></div>))}</div><div className="border-t border-dashed"></div></>)}
                                <div className="space-y-1">{discount > 0 && (<><div className={`flex justify-between font-bold ${is58mm ? 'text-[9px]' : 'text-[10px]'}`}><span>SUBTOTAL</span><span>Rs. {formatAmount(subtotal)}</span></div><div className={`flex justify-between font-bold text-red-600 ${is58mm ? 'text-[9px]' : 'text-[10px]'}`}><span>DISCOUNT {tx.discountType === 'percent' ? `(${tx.discountValue}%)` : ''}</span><span>- Rs. {formatAmount(discount)}</span></div></>)}<div className={`flex justify-between font-bold ${is58mm ? 'text-[11px]' : 'text-lg'}`}><span>TOTAL BILL</span><span>Rs. {formatAmount(netAmount)}</span></div>{tx.paymentType === 'Credit' && (<div className="pt-2 border-t border-dotted mt-1"><div className={`flex justify-between font-bold text-blue-700 ${is58mm ? 'text-[9px]' : 'text-[10px]'}`}><span>{tx.type.includes('return') ? 'REFUNDED (WAPIS KIYE)' : 'PAID (ADA SHUDA)'}</span><span>Rs. {formatAmount(paid)}</span></div>{balanceDue > 0 && (<div className={`flex justify-between font-black text-red-600 mt-1 bg-red-50 p-1 rounded ${is58mm ? 'text-[10px]' : 'text-xs'}`}><span>BALANCE (BAQAYA)</span><span>Rs. {formatAmount(balanceDue)}</span></div>)}</div>)}</div>
                                {tx.description && (<div className="mt-4 p-2 bg-slate-50 border border-dashed border-slate-300 rounded text-left"><p className="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Transaction Note</p><p className={`font-bold text-slate-700 italic ${is58mm ? 'text-[10px]' : 'text-[11px]'}`}>{tx.description}</p></div>)}
                                {tx.type === 'sale' && (paymentDetails || paymentQR) && (<div className="mt-4 pt-4 border-t border-dashed text-center"><p className="text-[9px] font-black text-blue-600 uppercase tracking-[0.2em] mb-2">Payment Information</p>{paymentDetails && (<p className={`font-bold text-slate-700 mb-3 whitespace-pre-line leading-relaxed ${is58mm ? 'text-[10px]' : 'text-[11px]'}`}>{paymentDetails}</p>)}{paymentQR && (<div className="flex flex-col items-center"><img src={paymentQR} className="w-24 h-24 border-2 border-slate-100 rounded-lg p-1" /><p className="text-[8px] font-black text-slate-400 mt-1 uppercase">Scan to Pay</p></div>)}</div>)}
                                <div className="border-t border-dashed pt-4 text-center"><p className="text-[9px] font-black text-slate-400 mt-3">( Powered by Dukan360 )</p></div>
                            </div>
                        </div>
                        <div className="p-4 bg-slate-50 border-t flex gap-2 print-hide"><button onClick={() => window.print()} className="flex-1 bg-slate-800 text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 text-xs"><Icon name="Printer" size={16} /> Print</button><button onClick={handleShare} disabled={isCapturing} className="flex-1 bg-green-600 text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 text-xs">{isCapturing ? 'Processing...' : 'Share Bill'}</button></div>
                    </div>
                </div>
            );
        };


        const SuccessAnimation = () => {
            return (
                <div className="fixed inset-0 z-[2000] flex items-center justify-center bg-black/50 backdrop-blur-sm animate-in fade-in duration-200">
                    <div className="bg-white rounded-3xl p-8 flex flex-col items-center shadow-2xl animate-in zoom-in duration-300 transform scale-100">
                        <div className="w-24 h-24 bg-green-100/50 rounded-full flex items-center justify-center mb-4 ring-8 ring-green-50">
                            <Icon name="Check" size={48} className="text-green-600" />
                        </div>
                        <h3 className="text-xl font-black text-slate-800 uppercase tracking-widest">Saved!</h3>
                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mt-1">Transaction Complete</p>
                    </div>
                </div>
            );
        };

        const Dashboard = ({ statsGroups, ownerName, currentFilter, setFilter, customStart, setCustomStart, customEnd, setCustomEnd, transactions, onEdit, onDelete, onViewBill, onStatClick, isRomanUrduEnabled, onAddExpense, subscription, isSubscriptionActive, daysLeft, isPrinterConnected, isInvoicePreviewEnabled, productsList }) => {
            const filterLabel = { today: 'Today', yesterday: 'Yesterday', month: 'This Month', custom: 'Range' }[currentFilter] || 'Current';
            const [showFilterMenu, setShowFilterMenu] = useState(false);
            const [showNotifMenu, setShowNotifMenu] = useState(false);
            const [isClearNotifModalOpen, setIsClearNotifModalOpen] = useState(false);
            const [visibleTxCount, setVisibleTxCount] = useState(10);
            
            // --- NEW STATES FOR RECENT ACTIVITY SEARCH & FILTERS ---
            const [activitySearch, setActivitySearch] = useState("");
            const [activityDateFilter, setActivityDateFilter] = useState("all");
            const [activityTypeFilter, setActivityTypeFilter] = useState("all");
            const [activityCustomStart, setActivityCustomStart] = useState(getIsoDate());
            const [activityCustomEnd, setActivityCustomEnd] = useState(getIsoDate());

            const dashFilterRef = useRef(null);
            const notifMenuRef = useRef(null);

            const [clearedAlertIds, setClearedAlertIds] = useLocalStorage('gs_v4_cleared_alert_ids', []);
            const [seenAlertIds, setSeenAlertIds] = useLocalStorage('gs_v4_seen_alert_ids', []);

            const allAlerts = useMemo(() => {
                if (!productsList) return [];
                const alerts = [];
                productsList.forEach(p => {
                    if (p.openingStock <= 0) {
                        alerts.push({ id: `oos_${p.id}_${p.openingStock}`, type: 'oos', name: p.name, msg: 'Out of stock' });
                    } else if (p.openingStock <= (p.minStock || 0)) {
                        alerts.push({ id: `low_${p.id}_${p.openingStock}`, type: 'low', name: p.name, msg: `Low stock (${p.openingStock} left)` });
                    }
                    if (isNearExpiry(p.expiryDate)) {
                        alerts.push({ id: `exp_${p.id}_${p.expiryDate}`, type: 'exp', name: p.name, msg: `Expiring soon (${p.expiryDate})` });
                    }
                });
                return alerts;
            }, [productsList]);

            const visibleAlerts = useMemo(() => {
                return allAlerts.filter(a => !clearedAlertIds.includes(a.id));
            }, [allAlerts, clearedAlertIds]);

            const unreadCount = useMemo(() => {
                return visibleAlerts.filter(a => !seenAlertIds.includes(a.id)).length;
            }, [visibleAlerts, seenAlertIds]);

            const latestVisibleAlerts = useRef(visibleAlerts);
            useEffect(() => {
                latestVisibleAlerts.current = visibleAlerts;
            }, [visibleAlerts]);

            const wasNotifMenuOpen = useRef(false);
            useEffect(() => {
                if (showNotifMenu) {
                    wasNotifMenuOpen.current = true;
                } else if (wasNotifMenuOpen.current) {
                    wasNotifMenuOpen.current = false;
                    const newSeen = latestVisibleAlerts.current.map(a => a.id);
                    setSeenAlertIds(prev => Array.from(new Set([...prev, ...newSeen])));
                }
            }, [showNotifMenu, setSeenAlertIds]);

            const displayAlerts = useMemo(() => {
                const unread = visibleAlerts.filter(a => !seenAlertIds.includes(a.id)).reverse();
                const read = visibleAlerts.filter(a => seenAlertIds.includes(a.id)).reverse();
                return [...unread, ...read];
            }, [visibleAlerts, seenAlertIds]);

            // --- FILTER LOGIC FOR RECENT ACTIVITY ---
            const filteredActivity = useMemo(() => {
                let filtered = transactions;

                if (activitySearch) {
                    const lowerQuery = activitySearch.toLowerCase();
                    filtered = filtered.filter(t => 
                        (t.contactName && t.contactName.toLowerCase().includes(lowerQuery)) ||
                        (t.description && t.description.toLowerCase().includes(lowerQuery)) ||
                        (t.id && String(t.id).toLowerCase().includes(lowerQuery))
                    );
                }

                const today = getIsoDate();
                if (activityDateFilter === 'today') {
                    filtered = filtered.filter(t => t.date === today);
                } else if (activityDateFilter === 'yesterday') {
                    const y = new Date(); y.setDate(y.getDate() - 1);
                    const yesterday = getIsoDate(y);
                    filtered = filtered.filter(t => t.date === yesterday);
                } else if (activityDateFilter === 'thisMonth') {
                    const month = today.substring(0, 7);
                    filtered = filtered.filter(t => t.date.startsWith(month));
                } else if (activityDateFilter === 'custom') {
                    filtered = filtered.filter(t => t.date >= activityCustomStart && t.date <= activityCustomEnd);
                }

                if (activityTypeFilter !== 'all') {
                    filtered = filtered.filter(t => t.type === activityTypeFilter);
                }

                return filtered;
            }, [transactions, activitySearch, activityDateFilter, activityTypeFilter, activityCustomStart, activityCustomEnd]);

            useEffect(() => {
                const handleClickOutside = (e) => {
                    if (dashFilterRef.current && !dashFilterRef.current.contains(e.target)) setShowFilterMenu(false);
                    if (notifMenuRef.current && !notifMenuRef.current.contains(e.target)) setShowNotifMenu(false);
                };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);

            return (
                <div className="p-4 space-y-6 text-left relative pb-24">
                    <div className="flex justify-between items-start">
                        <div>
                            <h1 className="text-2xl font-bold text-slate-800">Assalam-o-Alaikum!</h1>
                            <p className="text-blue-600 text-lg font-bold -mt-1">{ownerName || 'Owner'}</p>

                            <div className="flex flex-wrap items-center gap-2 mt-2">
                                <div className="flex items-center gap-1 bg-white border border-slate-100 rounded-full px-2 py-0.5 w-fit shadow-sm">
                                    <span className="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span>
                                    <span className="text-[9px] font-bold text-slate-500 uppercase tracking-tighter">Viewing: {filterLabel}</span>
                                </div>

                                {isInvoicePreviewEnabled && (
                                    <div className={`flex items-center gap-1 border px-2 py-0.5 rounded-full shadow-sm transition-all duration-300 ${isPrinterConnected ? 'bg-green-50 border-green-200 text-green-700' : 'bg-red-50 border-red-200 text-red-600'}`}>
                                        <Icon name="Printer" size={10} />
                                        <span className="text-[9px] font-black uppercase tracking-widest">{isPrinterConnected ? 'Printer: Connected' : 'Printer: Offline'}</span>
                                    </div>
                                )}

                                {!isSubscriptionActive ? (
                                    <div className="bg-red-50 text-red-600 border border-red-100 px-2 py-0.5 rounded-full shadow-sm flex items-center gap-1 animate-pulse">
                                        <Icon name="Lock" size={10} />
                                        <span className="text-[9px] font-black uppercase tracking-widest">Plan Khatam</span>
                                    </div>
                                ) : (
                                    subscription && subscription.status === 'trial' && (
                                        <div className="bg-amber-50 border border-amber-200 px-2 py-0.5 rounded-full shadow-sm flex items-center gap-1">
                                            <Icon name="Clock" size={10} className="text-amber-600" />
                                        <span className="text-[9px] font-black text-amber-700 uppercase tracking-wide">Trial: {daysLeft} Din Baqi</span>
                                    </div>
                                )
                            )}
                        </div>
                    </div>
                    <div className="flex items-center gap-2">
                        <div className="relative" ref={notifMenuRef}>
                            <button onClick={() => setShowNotifMenu(!showNotifMenu)} className="w-10 h-10 bg-white border border-slate-200 rounded-xl flex items-center justify-center text-slate-600 shadow-sm active:scale-90 relative">
                                <Icon name="Bell" size={20} />
                                {unreadCount > 0 && <span className="absolute -top-1.5 -right-1.5 min-w-[20px] h-5 flex items-center justify-center px-1 bg-red-500 text-white text-[10px] font-black rounded-full border-2 border-white shadow-sm animate-bounce">{unreadCount > 99 ? '99+' : unreadCount}</span>}
                            </button>
                            {showNotifMenu && (
                                <div className="absolute top-12 right-0 w-64 bg-white rounded-2xl shadow-xl border border-slate-100 z-[100] overflow-hidden flex flex-col max-h-[320px] animate-in zoom-in duration-100 origin-top-right">
                                    <div className="p-3 border-b flex justify-between items-center bg-slate-50 shrink-0">
                                        <h3 className="font-bold text-sm text-slate-800">Notifications</h3>
                                        {visibleAlerts.length > 0 && (
                                            <button onClick={() => setIsClearNotifModalOpen(true)} className="text-[10px] font-bold text-red-500 hover:text-red-600 bg-red-50 px-2 py-1 rounded-md active:scale-95">Clear All</button>
                                        )}
                                    </div>
                                    <div className="flex-1 overflow-y-auto no-scrollbar p-2 space-y-2">
                                        {visibleAlerts.length === 0 ? (
                                            <div className="py-6 text-center opacity-40">
                                                <Icon name="BellOff" size={32} className="mx-auto mb-2" />
                                                <p className="text-[10px] font-bold uppercase tracking-widest">No New Alerts</p>
                                            </div>
                                        ) : (
                                            displayAlerts.map(a => {
                                                const isUnread = !seenAlertIds.includes(a.id);
                                                return (
                                                    <div key={a.id} className={`p-2 bg-white rounded-xl border flex items-start gap-2 shadow-sm transition-all ${isUnread ? 'border-blue-200 bg-blue-50/40' : 'border-slate-100'}`}>
                                                        <div className={`mt-1.5 w-2 h-2 rounded-full shrink-0 ${a.type === 'oos' ? 'bg-red-500' : a.type === 'low' ? 'bg-orange-500' : 'bg-blue-500'}`}></div>
                                                        <div className="flex-1 min-w-0 pr-1">
                                                            <p className="text-xs font-bold text-slate-800 leading-tight truncate">{a.name}</p>
                                                            <p className={`text-[10px] font-bold mt-0.5 ${a.type === 'oos' ? 'text-red-600' : a.type === 'low' ? 'text-orange-600' : 'text-blue-600'}`}>{a.msg}</p>
                                                        </div>
                                                        {isUnread && (
                                                            <span className="text-[8px] bg-red-500 text-white px-1.5 py-0.5 rounded-md font-black uppercase tracking-widest mt-0.5 shrink-0 animate-pulse">New</span>
                                                        )}
                                                    </div>
                                                );
                                            })
                                        )}
                                    </div>
                                </div>
                            )}
                        </div>
                        <div className="relative" ref={dashFilterRef}>
                            <button onClick={() => setShowFilterMenu(!showFilterMenu)} className="w-10 h-10 bg-white border border-slate-200 rounded-xl flex items-center justify-center text-slate-600 shadow-sm active:scale-90 relative"><Icon name="Filter" size={20} /></button>
                            {showFilterMenu && (<div className="absolute top-12 right-0 w-40 bg-white rounded-2xl shadow-xl border border-slate-100 z-[100] overflow-hidden py-1 animate-in zoom-in duration-100 origin-top-right">{['today', 'yesterday', 'month', 'custom'].map(f => (<div key={f} onClick={(e) => { e.stopPropagation(); setFilter(f); setShowFilterMenu(false); }} className={`px-4 py-2 text-xs font-bold capitalize hover:bg-slate-50 ${currentFilter === f ? 'text-blue-600 bg-blue-50/50' : 'text-slate-600'}`}>{f === 'month' ? 'This Month' : f}</div>))}</div>)}
                        </div>
                    </div>
                </div>
